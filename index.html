  // ===================== i18n: hand-written EN (default) / original DE =======
  window.LANG = "en";
  var DE_BLOCKS = {"i18n-intro": "\n                                <span class=\"dd-kicker\">Intermediate Macroeconomics</span>\n                                <h2>Das dynamische AD-AS-Modell</h2>\n                                <p class=\"dd-lead\">\n                                    Das <strong>DAS-DAD-Modell</strong> (Dynamic Aggregate Supply – Dynamic Aggregate\n                                    Demand) beschreibt, wie sich Output und Inflation einer Volkswirtschaft\n                                    <em>über die Zeit</em> entwickeln, nachdem sie von einem Schock getroffen wurde.\n                                    Anders als das statische AD-AS-Diagramm enthält es eine explizite Geldpolitik\n                                    (Taylor-Regel), eine erwartungsbasierte Phillips-Kurve und eine\n                                    Differenzengleichung, die das System Periode für Periode zurück ins\n                                    Gleichgewicht trägt.\n                                </p>\n                            ", "i18n-glance": "\n                                <span class=\"dd-chip\">Zeit: <b>diskret</b> (\\(t,\\,t{+}1,\\dots\\))</span>\n                                <span class=\"dd-chip\">Endogen: <b>\\(Y_t,\\ \\pi_t\\)</b></span>\n                                <span class=\"dd-chip\">Politik: <b>Taylor-Regel</b></span>\n                                <span class=\"dd-chip\">Stabilität wenn <b>\\(\\gamma\\phi>0\\)</b></span>\n                                <span class=\"dd-chip\">Lehrbuch: <b>Mankiw, Kap. 15</b><sup class=\"dd-cite\" title=\"Mankiw, Macroeconomics – Kapitel 'A Dynamic Model of Economic Fluctuations'\">[1]</sup></span>\n                            ", "i18n-goals": "\n                                <h3>Lernziele</h3>\n                                <ul>\n                                    <li>Die beiden Kerngleichungen (DAD &amp; DAS) <strong>herleiten</strong> und ökonomisch interpretieren.</li>\n                                    <li>Zwischen <strong>endogenen, exogenen und vorherbestimmten</strong> Variablen unterscheiden.</li>\n                                    <li>Die Wirkung eines <strong>Nachfrage-</strong> bzw. <strong>Angebotsschocks</strong> auf \\(Y_t\\) und \\(\\pi_t\\) vorhersagen.</li>\n                                    <li>Den <strong>Anpassungspfad</strong> zurück zum Gleichgewicht als geometrisches Abklingen mit Rate \\(a=\\tfrac{1}{1+\\gamma\\phi}\\) verstehen.</li>\n                                    <li>Eine <strong>Impulse-Response-Funktion</strong> lesen: Spitzenreaktion, Halbwertszeit und kumulierter Verlust.</li>\n                                    <li>Den <strong>Trade-off</strong> der Geldpolitik bei Angebotsschocks (Output vs. Inflation) erklären.</li>\n                                </ul>\n                            ", "i18n-history": "\n                                <span class=\"dd-callout-title\">Woher kommen diese Ideen?</span>\n                                Die Phillips-Kurve geht auf <strong>A. W. Phillips (1958)</strong> zurück<sup class=\"dd-cite\" title=\"Phillips (1958), Economica\">[2]</sup>;\n                                <strong>Friedman (1968)</strong> und <strong>Phelps (1967)</strong> fügten Erwartungen und die\n                                natürliche Arbeitslosenquote hinzu<sup class=\"dd-cite\" title=\"Friedman (1968), AER; Phelps (1967)\">[3]</sup>.\n                                Die geldpolitische Reaktionsfunktion formalisierte <strong>Taylor (1993)</strong><sup class=\"dd-cite\" title=\"Taylor (1993), Carnegie-Rochester\">[4]</sup>.\n                                Die hier verwendete lehrbuchartige Synthese ohne LM-Kurve folgt <strong>Romer (2000)</strong><sup class=\"dd-cite\" title=\"Romer (2000), JEP – Keynesian Macro without the LM Curve\">[5]</sup>\n                                und <strong>Mankiw</strong><sup class=\"dd-cite\" title=\"Mankiw, Macroeconomics\">[1]</sup>; die moderne mikrofundierte Variante ist die\n                                New-Keynesian-Synthese von <strong>Clarida, Galí &amp; Gertler (1999)</strong><sup class=\"dd-cite\" title=\"Clarida, Galí & Gertler (1999), JEL\">[6]</sup>.\n                                Die vollständige Literaturliste finden Sie unten.\n                            ", "i18n-eqh": "Gleichungen", "i18n-eqp": "Hier finden Sie eine kurze Einleitung und die Herleitung des Modells. Klicken Sie auf die Variablen um genauere Informationen zu erhalten.", "i18n-stability": "\n                                <span class=\"dd-kicker\">Mechanik</span>\n                                <h2>Gleichgewicht, Dynamik &amp; Stabilität</h2>\n                                <p>\n                                    Setzt man die DAD- in die DAS-Gleichung ein, erhält man eine lineare\n                                    <strong>Differenzengleichung erster Ordnung</strong> für die Inflation:\n                                </p>\n                                \\[\n                                    \\pi_t-\\pi^\\star=\\underbrace{\\frac{1}{1+\\gamma\\phi}}_{\\textstyle a}\\,(\\pi_{t-1}-\\pi^\\star)\n                                    \\;+\\;\\frac{\\phi\\kappa}{1+\\gamma\\phi}\\,\\epsilon_t\\;+\\;\\frac{1}{1+\\gamma\\phi}\\,\\nu_t .\n                                \\]\n                                <p>\n                                    Nach einem einmaligen Schock klingt die Abweichung vom Ziel geometrisch ab:\n                                    \\(\\pi_{t+k}-\\pi^\\star=a^{\\,k}(\\pi_t-\\pi^\\star)\\). Das System ist <strong>stabil</strong>,\n                                    solange \\(|a|<1\\), also \\(\\gamma\\phi>0\\) — die Zentralbank (\\(\\gamma\\)) und die\n                                    Phillips-Kurve (\\(\\phi\\)) ziehen die Wirtschaft gemeinsam zurück ins Gleichgewicht.\n                                </p>\n\n                                <div class=\"dd-callout intuition\">\n                                    <span class=\"dd-callout-title\">Intuition: Warum verschwinden Schocks?</span>\n                                    Steigt die Inflation über das Ziel, reagiert die Zentralbank mit höheren Realzinsen\n                                    (über die Taylor-Regel), die Nachfrage und damit den Output dämpfen. Die entstehende\n                                    negative Outputlücke senkt über die Phillips-Kurve wiederum die Inflation. Je\n                                    energischer die Geldpolitik (\\(\\gamma\\)) und je steiler die Phillips-Kurve (\\(\\phi\\)),\n                                    desto schneller das Abklingen — die <em>Halbwertszeit</em> beträgt \\(\\ln 0.5/\\ln a\\) Perioden.\n                                </div>\n\n                                <div class=\"dd-callout supply\">\n                                    <span class=\"dd-callout-title\">Der geldpolitische Trade-off</span>\n                                    Ein <strong>Nachfrageschock</strong> bewegt Output und Inflation in dieselbe Richtung —\n                                    die Politik kann beide Ziele gleichzeitig stabilisieren. Ein <strong>Angebotsschock</strong>\n                                    bewegt sie gegenläufig (Stagflation): Inflationsbekämpfung verschärft die Rezession.\n                                    Genau dieser Konflikt macht Angebotsschocks für Zentralbanken so unangenehm.\n                                </div>\n                            ", "literatur": "\n                                <span class=\"dd-kicker\">Vertiefung</span>\n                                <h2>Weiterführende Literatur &amp; Quellen</h2>\n                                <p>Die nummerierten Verweise <sup class=\"dd-cite\">[n]</sup> im Text beziehen sich auf diese Liste.</p>\n                                <ol class=\"dd-refs\">\n                                    <li>Mankiw, N. G. <em>Macroeconomics.</em> Worth/Macmillan — Kapitel „A Dynamic Model of Economic Fluctuations“ (Standard-Lehrbuchdarstellung des DAS-DAD-Modells). <span class=\"ref-tag\">Lehrbuch</span></li>\n                                    <li>Phillips, A. W. (1958). „The Relation between Unemployment and the Rate of Change of Money Wage Rates in the United Kingdom, 1861–1957.“ <em>Economica</em>, 25(100), 283–299. <span class=\"ref-tag\">Phillips-Kurve</span></li>\n                                    <li>Friedman, M. (1968). „The Role of Monetary Policy.“ <em>American Economic Review</em>, 58(1), 1–17; sowie Phelps, E. S. (1967), <em>Economica</em>. <span class=\"ref-tag\">Erwartungen</span></li>\n                                    <li>Taylor, J. B. (1993). „Discretion versus Policy Rules in Practice.“ <em>Carnegie-Rochester Conference Series on Public Policy</em>, 39, 195–214. <span class=\"ref-tag\">Taylor-Regel</span></li>\n                                    <li>Romer, D. (2000). „Keynesian Macroeconomics without the LM Curve.“ <em>Journal of Economic Perspectives</em>, 14(2), 149–169. <span class=\"ref-tag\">Modellaufbau</span></li>\n                                    <li>Clarida, R., Galí, J., &amp; Gertler, M. (1999). „The Science of Monetary Policy: A New Keynesian Perspective.“ <em>Journal of Economic Literature</em>, 37(4), 1661–1707. <span class=\"ref-tag\">New Keynesian</span></li>\n                                    <li>Galí, J. (2015). <em>Monetary Policy, Inflation, and the Business Cycle.</em> 2. Aufl., Princeton University Press. <span class=\"ref-tag\">Mikrofundierung</span></li>\n                                    <li>Woodford, M. (2003). <em>Interest and Prices: Foundations of a Theory of Monetary Policy.</em> Princeton University Press. <span class=\"ref-tag\">Theorie</span></li>\n                                    <li>Fisher, I. (1930). <em>The Theory of Interest.</em> Macmillan — Grundlage der Fisher-Gleichung \\(i=r+\\pi^e\\). <span class=\"ref-tag\">Realzins</span></li>\n                                    <li>Okun, A. M. (1962). „Potential GNP: Its Measurement and Significance.“ — Hintergrund zur Outputlücke. <span class=\"ref-tag\">Outputlücke</span></li>\n                                    <li>Blanchard, O. <em>Macroeconomics.</em> Pearson — ergänzende Lehrbuchdarstellung von AD-AS-Dynamik. <span class=\"ref-tag\">Lehrbuch</span></li>\n                                </ol>\n                            ", "glossar": "\n                                <span class=\"dd-kicker\">Nachschlagen</span>\n                                <h2>Glossar</h2>\n                                <dl class=\"dd-glossary\">\n                                    <dt>Outputlücke (\\(Y_t-\\bar{Y}\\))</dt>\n                                    <dd>Abweichung des tatsächlichen Outputs vom natürlichen Niveau \\(\\bar{Y}\\). Positiv = Boom, negativ = Rezession.</dd>\n                                    <dt>Natürliches Outputniveau (\\(\\bar{Y}\\))</dt>\n                                    <dd>Produktionsniveau bei flexiblen Preisen und normaler Kapazitätsauslastung; langfristiger Ankerpunkt.</dd>\n                                    <dt>Inflationsziel (\\(\\pi^\\star\\))</dt>\n                                    <dd>Von der Zentralbank angestrebte Inflationsrate (z. B. 2 %), zu der das System langfristig zurückkehrt.</dd>\n                                    <dt>Nachfrageschock (\\(\\epsilon_t\\))</dt>\n                                    <dd>Exogene Verschiebung der gesamtwirtschaftlichen Nachfrage (z. B. Fiskalpolitik, Stimmung, Export). Verschiebt die DAD-Kurve.</dd>\n                                    <dt>Angebotsschock (\\(\\nu_t\\))</dt>\n                                    <dd>Exogene Verschiebung der Inflation bei gegebener Outputlücke (z. B. Ölpreis). Verschiebt die DAS-Kurve.</dd>\n                                    <dt>\\(\\gamma\\) — Nachfrage-Sensitivität</dt>\n                                    <dd>Wie stark der Output auf Inflationsabweichungen reagiert (enthält die Aggressivität der Geldpolitik). Höheres \\(\\gamma\\) ⇒ schnellere Stabilisierung.</dd>\n                                    <dt>\\(\\phi\\) — Steigung der Phillips-Kurve</dt>\n                                    <dd>Wie stark die Inflation auf die Outputlücke reagiert. Höheres \\(\\phi\\) ⇒ flexiblere Preise.</dd>\n                                    <dt>Impulse-Response-Funktion (IRF)</dt>\n                                    <dd>Zeitpfad der Reaktion einer Variablen auf einen einmaligen Schock — zeigt Spitzenreaktion, Persistenz und Rückkehr ins Gleichgewicht.</dd>\n                                    <dt>Halbwertszeit</dt>\n                                    <dd>Anzahl Perioden, bis die Hälfte der anfänglichen Schockwirkung abgebaut ist: \\(\\ln 0.5/\\ln a\\) mit \\(a=\\tfrac{1}{1+\\gamma\\phi}\\).</dd>\n                                </dl>\n                            ", "backtomenu-button1": "<span class=\"btn-text\">Grössen und Gleichungen</span>", "start-model-button": "<span class=\"btn-text\">Graphische Darstellung</span>", "backtomenu-button": "<span class=\"btn-text\">Grössen und Gleichungen</span>", "graph-button": "<span class=\"btn-text\">Graphische Darstellung</span>", "i18n-instr": "\n          Wählen Sie beliebige exogene Grössen aus, in dem Sie auf die entsprechende Variable klicken. \n      ", "i18n-scentitle": "Szenarien", "i18n-sc1": "Nachfrageschock<small>Boom &amp; Inflation</small>", "i18n-sc2": "Angebotsschock<small>Stagflation</small>", "i18n-sc3": "Nachfrageschock<small>Rezession</small>", "i18n-sc4": "Angebotsschock<small>Günstiger Ölpreis</small>", "i18n-sc5": "Ölkrise 1970er<small>Anhaltende Stagflation</small>", "i18n-sc6": "Fiskalexpansion<small>Anhaltender Boom</small>", "i18n-sc7": "Finanzkrise 2008<small>Tiefe Rezession</small>", "i18n-sc8": "COVID-19-Schock<small>Einbruch &amp; Inflationswelle</small>", "dd-reset-btn": "Zurücksetzen", "i18n-exvar": "Exogene Variablen \n\n    ", "i18n-gt-demand": "Nachfrageschock", "i18n-gt-supply": "Angebotsschock\n                <select id=\"time_selectS\" class=\"modern-input2 hidden\">\n                    <option value=\"t\">t</option>\n                    <option value=\"t+1\">t+1</option>\n                </select>\n            ", "i18n-expar": "Exogene Parameter\n\n    ", "dd-savegif-btn": "GIF speichern", "dd-play-label": "Anpassung animieren", "explanation-text": "Ein höheres bedeutet, dass kleine Abweichungen der Inflation vom Ziel zu größeren Veränderungen in der Outputlücke führen.", "next-explanation": "Weiter", "next-explanation1": "Zurück", "i18n-irfcap": "\n      Eine <strong>Impulse-Response-Funktion (IRF)</strong> zeigt den Zeitpfad der Abweichung\n      vom Gleichgewicht nach einem einmaligen Schock. Die Kennzahlen unten fassen die Reaktion zusammen.\n    ", "i18n-lbl1": "Spitze Inflation", "i18n-lbl2": "Spitze Output", "i18n-lbl3": "Halbwertszeit", "i18n-lbl4": "Kum. Outputverlust", "irf-peak-pi-t": "Periode –", "irf-peak-y-t": "Periode –", "i18n-sub3": "Perioden bis ½", "i18n-sub4": "Σ Abweichungen", "expl-plot2-discrete": "\n          <strong>Anpassung der Inflationsrate (Nachfrage- oder Angebotsschock)</strong>\n\n          <!-- Supply Shock Part -->\n          <p>\n            <em>Reiner Angebotsschock</em>\n            (\\(\\nu_t \\neq 0\\), \\(\\epsilon_t = 0\\)):\n            <br><br>\n            Dann ergibt sich iterativ:\n            \\[\n              \\pi_t\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\nu_t}{\\,1 + \\gamma\\,\\phi\\,}\n              \\qquad\n              \\pi_{t+1}\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\nu_t}{\\,(1 + \\gamma\\,\\phi)^2\\,}\n              \\qquad\n              \\pi_{t+2}\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\nu_t}{\\,(1 + \\gamma\\,\\phi)^3\\,}\n              \\quad\n            \\]\n          </p>\n\n          <!-- Demand Shock Part -->\n          <p>\n            <em>Reiner Nachfrageschock</em>\n            (\\(\\epsilon_t \\neq 0\\), \\(\\nu_t = 0\\)):\n            <br><br>\n            Dann ergibt sich iterativ:\n            \\[\n              \\pi_t\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\kappa\\,\\phi\\,\\epsilon_t}{\\,1 + \\gamma\\,\\phi\\,}\n              \\qquad\n              \\pi_{t+1}\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\kappa\\,\\phi\\,\\epsilon_t}{\\,(1 + \\gamma\\,\\phi)^2\\,}\n              \\qquad\n              \\pi_{t+2}\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\kappa\\,\\phi\\,\\epsilon_t}{\\,(1 + \\gamma\\,\\phi)^3\\,}\n              \\quad\n            \\]\n          </p>\n\n          <p>Damit der Schock verschwindet, benötigen wir \\(\\gamma\\phi>0\\).</p>\n          <p>Die dargestellten Resultate in der Tabelle wurden auf zwei Nachkommastellen gerundet.</p>\n        ", "expl-plot2-matrix": "\n          <strong>Anpassung der Inflationsrate (Matrix-/Zustandsraum-Darstellung)</strong>\n\n          <p>\n            Definiere \\(D = 1 + \\gamma\\phi\\). Die Inflationsdynamik kann kompakt als lineare Rekursion geschrieben werden:\n            \\[\n              \\pi_{t+1} = a\\,\\pi_t + b + c_\\epsilon\\,\\epsilon_{t+1} + c_\\nu\\,\\nu_{t+1}.\n            \\]\n            Dabei sind die Koeffizienten:\n            \\[\n              a = 1 - \\frac{\\phi\\gamma}{D}, \\qquad\n              b = \\frac{\\phi\\gamma}{D}\\,\\pi^\\star, \\qquad\n              c_\\epsilon = \\frac{\\phi\\kappa}{D}, \\qquad\n              c_\\nu = 1 - \\frac{\\phi\\gamma}{D}.\n            \\]\n          </p>\n\n          <p>\n            In Matrixform (augmentierter Zustand) ergibt sich:\n            \\[\n              \\begin{pmatrix}\\pi_{t+1}\\\\1\\end{pmatrix}\n              =\n              \\underbrace{\\begin{pmatrix}a & b\\\\0 & 1\\end{pmatrix}}_{A}\n              \\begin{pmatrix}\\pi_t\\\\1\\end{pmatrix}\n              +\n              \\underbrace{\\begin{pmatrix}c_\\epsilon & c_\\nu\\\\0 & 0\\end{pmatrix}}_{B}\n              \\begin{pmatrix}\\epsilon_{t+1}\\\\\\nu_{t+1}\\end{pmatrix}.\n            \\]\n            Diese Darstellung ist praktisch, weil man über viele Perioden schnell iterieren kann\n            (genau so arbeitet die effiziente Simulation im Code).\n          </p>\n\n          <p>\n            Falls nach einem einmaligen Schock keine weiteren Schocks auftreten (\\(\\epsilon=\\nu=0\\) für \\(t+k\\ge1\\)),\n            dann gilt:\n            \\[\n              \\pi_{t+k} - \\pi^\\star = a^k\\,(\\pi_t - \\pi^\\star),\n            \\]\n            d.h. geometrisches Abklingen. Stabilität entspricht \\(|a|<1\\), was hier bei \\(\\gamma\\phi>0\\) erfüllt ist.\n          </p>\n        ", "expl-plot3-discrete": "\n          <strong>Anpassung des Outputs (Angebotsschock oder Nachfrageschock)</strong>\n\n          <p>\n            <em>Reiner Nachfrageschock</em>\n            (\\(\\epsilon_t \\neq 0\\), \\(\\nu_t = 0\\)):\n            <br><br>\n            Dann ergibt sich iterativ:\n            \\[\n              Y_t \\;=\\; \\bar{Y}\n              \\;+\\;\n              \\frac{\\kappa\\,\\epsilon_t}{\\,1 + \\gamma\\,\\phi\\,}\n              \\qquad\n              Y_{t+1} \\;=\\; \\bar{Y}\n              \\;-\\;\n              \\frac{\\kappa\\,\\epsilon_t}{\\,(1 + \\gamma\\,\\phi)^2\\,}\n              \\qquad\n              Y_{t+2} \\;=\\; \\bar{Y}\n              \\;-\\;\n              \\frac{\\kappa\\,\\epsilon_t}{\\,(1 + \\gamma\\,\\phi)^3\\,}\n              \\quad\n            \\]\n          </p>\n\n          <p>\n            <em>Reiner Angebotsschock</em>\n            (\\(\\nu_t \\neq 0\\), \\(\\epsilon_t = 0\\)):\n            <br><br>\n            Dann ergibt sich iterativ:\n            \\[\n              Y_t \\;=\\; \\bar{Y}\n              \\;-\\;\n              \\frac{\\gamma\\,\\nu_t}{\\,1 + \\gamma\\,\\phi\\,}\n              \\qquad\n              Y_{t+1} \\;=\\; \\bar{Y}\n              \\;-\\;\n              \\frac{\\gamma\\,\\nu_t}{\\,(1 + \\gamma\\,\\phi)^2\\,}\n              \\qquad\n              Y_{t+2} \\;=\\; \\bar{Y}\n              \\;-\\;\n              \\frac{\\gamma\\,\\nu_t}{\\,(1 + \\gamma\\,\\phi)^3\\,}\n              \\quad\n            \\]\n          </p>\n\n          <p>Die dargestellten Resultate in der Tabelle wurden auf zwei Nachkommastellen gerundet.</p>\n        ", "expl-plot3-matrix": "\n          <strong>Anpassung des Outputs (Matrix-/Zustandsraum-Darstellung)</strong>\n\n          <p>\n            Der Output wird im Modell aus Inflation und Schocks berechnet:\n            \\[\n              Y_{t+1} = \\bar{Y} - \\gamma(\\pi_{t+1}-\\pi^\\star) + \\kappa\\,\\epsilon_{t+1}.\n            \\]\n            Kombiniert man dies mit der kompakten Inflationsrekursion\n            \\[\n              \\pi_{t+1} = a\\,\\pi_t + b + c_\\epsilon\\,\\epsilon_{t+1} + c_\\nu\\,\\nu_{t+1},\n            \\]\n            erhält man \\(Y_{t+1}\\) als lineare Funktion von \\(\\pi_t\\) und den Schocks.\n          </p>\n\n          <p>\n            In Zustandsraum-Schreibweise kann man definieren:\n            \\[\n              s_t=\\begin{pmatrix}\\pi_t\\\\1\\end{pmatrix}, \\quad\n              u_{t+1}=\\begin{pmatrix}\\epsilon_{t+1}\\\\\\nu_{t+1}\\end{pmatrix}, \\quad\n              s_{t+1}=A s_t + B u_{t+1}.\n            \\]\n            Der Output ist dann eine lineare “Messgleichung”:\n            \\[\n              Y_{t+1} = \\bar{Y} - \\gamma\\left([1\\;0]\\,s_{t+1}-\\pi^\\star\\right) + \\kappa\\,\\epsilon_{t+1}.\n            \\]\n            Diese Form ist besonders praktisch, weil man die Entwicklung über viele Perioden effizient iterieren kann.\n          </p>\n        ", "show-latex-plot2": "Rechenschritte einblenden", "show-latex-plot3": "Rechenschritte einblenden", "i18n-view2": "<strong>Ansicht:</strong>", "i18n-view3": "<strong>Ansicht:</strong>", "i18n-disc2": "Diskret", "i18n-disc3": "Diskret", "i18n-welcome": "Willkommen zum DAS-DAD Modell", "i18n-startp": "Klicken Sie auf den Kreis, um das Modell zu starten.", "i18n-subjchange": "Änderungen vorbehalten."};
  var EN_BLOCKS = {"i18n-intro": "\n                                <span class=\"dd-kicker\">Intermediate Macroeconomics</span>\n                                <h2>The Dynamic AD-AS Model</h2>\n                                <p class=\"dd-lead\">\n                                    The <strong>DAS-DAD model</strong> (Dynamic Aggregate Supply &ndash; Dynamic Aggregate\n                                    Demand) describes how a country's output and inflation evolve\n                                    <em>over time</em> once a shock hits. Unlike the static AD-AS diagram, it builds in\n                                    explicit monetary policy (a Taylor rule), an expectations-augmented Phillips curve,\n                                    and a difference equation that pulls the economy back to equilibrium\n                                    period by period.\n                                </p>\n                            ", "i18n-glance": "\n                                <span class=\"dd-chip\">Time: <b>discrete</b> (\\(t,\\,t{+}1,\\dots\\))</span>\n                                <span class=\"dd-chip\">Endogenous: <b>\\(Y_t,\\ \\pi_t\\)</b></span>\n                                <span class=\"dd-chip\">Policy: <b>Taylor rule</b></span>\n                                <span class=\"dd-chip\">Stable when <b>\\(\\gamma\\phi>0\\)</b></span>\n                                <span class=\"dd-chip\">Textbook: <b>Mankiw, ch. 15</b><sup class=\"dd-cite\" title=\"Mankiw, Macroeconomics - chapter 'A Dynamic Model of Economic Fluctuations'\">[1]</sup></span>\n                            ", "i18n-goals": "\n                                <h3>Learning goals</h3>\n                                <ul>\n                                    <li><strong>Derive</strong> the two core equations (DAD &amp; DAS) and interpret them economically.</li>\n                                    <li>Tell <strong>endogenous, exogenous and predetermined</strong> variables apart.</li>\n                                    <li>Predict how a <strong>demand</strong> or <strong>supply shock</strong> feeds through to \\(Y_t\\) and \\(\\pi_t\\).</li>\n                                    <li>See the <strong>adjustment path</strong> back to equilibrium as geometric decay at rate \\(a=\\tfrac{1}{1+\\gamma\\phi}\\).</li>\n                                    <li>Read an <strong>impulse-response function</strong>: peak response, half-life and cumulative loss.</li>\n                                    <li>Explain monetary policy's <strong>trade-off</strong> under supply shocks (output vs. inflation).</li>\n                                </ul>\n                            ", "i18n-history": "\n                                <span class=\"dd-callout-title\">Where do these ideas come from?</span>\n                                The Phillips curve goes back to <strong>A. W. Phillips (1958)</strong><sup class=\"dd-cite\" title=\"Phillips (1958), Economica\">[2]</sup>;\n                                <strong>Friedman (1968)</strong> and <strong>Phelps (1967)</strong> added expectations and the\n                                natural rate of unemployment<sup class=\"dd-cite\" title=\"Friedman (1968), AER; Phelps (1967)\">[3]</sup>.\n                                <strong>Taylor (1993)</strong> formalised the monetary-policy reaction function<sup class=\"dd-cite\" title=\"Taylor (1993), Carnegie-Rochester\">[4]</sup>.\n                                The textbook-style synthesis used here, without an LM curve, follows <strong>Romer (2000)</strong><sup class=\"dd-cite\" title=\"Romer (2000), JEP - Keynesian Macro without the LM Curve\">[5]</sup>\n                                and <strong>Mankiw</strong><sup class=\"dd-cite\" title=\"Mankiw, Macroeconomics\">[1]</sup>; the modern micro-founded version is the\n                                New Keynesian synthesis of <strong>Clarida, Gal&iacute; &amp; Gertler (1999)</strong><sup class=\"dd-cite\" title=\"Clarida, Gali & Gertler (1999), JEL\">[6]</sup>.\n                                The full reference list is below.\n                            ", "i18n-eqh": "Equations", "i18n-eqp": "Here is a short introduction and the derivation of the model. Click on any variable for more detail.", "i18n-stability": "\n                                <span class=\"dd-kicker\">Mechanics</span>\n                                <h2>Equilibrium, Dynamics &amp; Stability</h2>\n                                <p>\n                                    Substituting the DAD equation into the DAS equation gives a linear\n                                    <strong>first-order difference equation</strong> for inflation:\n                                </p>\n                                \\[\n                                    \\pi_t-\\pi^\\star=\\underbrace{\\frac{1}{1+\\gamma\\phi}}_{\\textstyle a}\\,(\\pi_{t-1}-\\pi^\\star)\n                                    \\;+\\;\\frac{\\phi\\kappa}{1+\\gamma\\phi}\\,\\epsilon_t\\;+\\;\\frac{1}{1+\\gamma\\phi}\\,\\nu_t .\n                                \\]\n                                <p>\n                                    After a one-off shock the gap from target decays geometrically:\n                                    \\(\\pi_{t+k}-\\pi^\\star=a^{\\,k}(\\pi_t-\\pi^\\star)\\). The system is <strong>stable</strong>\n                                    as long as \\(|a|<1\\), i.e. \\(\\gamma\\phi>0\\) &mdash; the central bank (\\(\\gamma\\)) and the\n                                    Phillips curve (\\(\\phi\\)) together pull the economy back to equilibrium.\n                                </p>\n\n                                <div class=\"dd-callout intuition\">\n                                    <span class=\"dd-callout-title\">Intuition: why do shocks fade out?</span>\n                                    When inflation runs above target, the central bank pushes real interest rates up\n                                    (through the Taylor rule), cooling demand and therefore output. The resulting\n                                    negative output gap then drags inflation back down via the Phillips curve. The more\n                                    aggressively policy reacts (\\(\\gamma\\)) and the steeper the Phillips curve (\\(\\phi\\)),\n                                    the faster the decay &mdash; the <em>half-life</em> is \\(\\ln 0.5/\\ln a\\) periods.\n                                </div>\n\n                                <div class=\"dd-callout supply\">\n                                    <span class=\"dd-callout-title\">The monetary-policy trade-off</span>\n                                    A <strong>demand shock</strong> moves output and inflation in the same direction &mdash;\n                                    policy can stabilise both at once. A <strong>supply shock</strong>\n                                    moves them in opposite directions (stagflation): fighting inflation deepens the recession.\n                                    It is precisely this conflict that makes supply shocks so awkward for central banks.\n                                </div>\n                            ", "literatur": "\n                                <span class=\"dd-kicker\">Going further</span>\n                                <h2>Further Reading &amp; Sources</h2>\n                                <p>The numbered references <sup class=\"dd-cite\">[n]</sup> in the text point to this list.</p>\n                                <ol class=\"dd-refs\">\n                                    <li>Mankiw, N. G. <em>Macroeconomics.</em> Worth/Macmillan &mdash; chapter &ldquo;A Dynamic Model of Economic Fluctuations&rdquo; (the standard textbook treatment of the DAS-DAD model). <span class=\"ref-tag\">Textbook</span></li>\n                                    <li>Phillips, A. W. (1958). &ldquo;The Relation between Unemployment and the Rate of Change of Money Wage Rates in the United Kingdom, 1861&ndash;1957.&rdquo; <em>Economica</em>, 25(100), 283&ndash;299. <span class=\"ref-tag\">Phillips curve</span></li>\n                                    <li>Friedman, M. (1968). &ldquo;The Role of Monetary Policy.&rdquo; <em>American Economic Review</em>, 58(1), 1&ndash;17; and Phelps, E. S. (1967), <em>Economica</em>. <span class=\"ref-tag\">Expectations</span></li>\n                                    <li>Taylor, J. B. (1993). &ldquo;Discretion versus Policy Rules in Practice.&rdquo; <em>Carnegie-Rochester Conference Series on Public Policy</em>, 39, 195&ndash;214. <span class=\"ref-tag\">Taylor rule</span></li>\n                                    <li>Romer, D. (2000). &ldquo;Keynesian Macroeconomics without the LM Curve.&rdquo; <em>Journal of Economic Perspectives</em>, 14(2), 149&ndash;169. <span class=\"ref-tag\">Model setup</span></li>\n                                    <li>Clarida, R., Gal&iacute;, J., &amp; Gertler, M. (1999). &ldquo;The Science of Monetary Policy: A New Keynesian Perspective.&rdquo; <em>Journal of Economic Literature</em>, 37(4), 1661&ndash;1707. <span class=\"ref-tag\">New Keynesian</span></li>\n                                    <li>Gal&iacute;, J. (2015). <em>Monetary Policy, Inflation, and the Business Cycle.</em> 2nd ed., Princeton University Press. <span class=\"ref-tag\">Micro-foundations</span></li>\n                                    <li>Woodford, M. (2003). <em>Interest and Prices: Foundations of a Theory of Monetary Policy.</em> Princeton University Press. <span class=\"ref-tag\">Theory</span></li>\n                                    <li>Fisher, I. (1930). <em>The Theory of Interest.</em> Macmillan &mdash; basis of the Fisher equation \\(i=r+\\pi^e\\). <span class=\"ref-tag\">Real interest rate</span></li>\n                                    <li>Okun, A. M. (1962). &ldquo;Potential GNP: Its Measurement and Significance.&rdquo; &mdash; background on the output gap. <span class=\"ref-tag\">Output gap</span></li>\n                                    <li>Blanchard, O. <em>Macroeconomics.</em> Pearson &mdash; a complementary textbook treatment of AD-AS dynamics. <span class=\"ref-tag\">Textbook</span></li>\n                                </ol>\n                            ", "glossar": "\n                                <span class=\"dd-kicker\">Reference</span>\n                                <h2>Glossary</h2>\n                                <dl class=\"dd-glossary\">\n                                    <dt>Output gap (\\(Y_t-\\bar{Y}\\))</dt>\n                                    <dd>How far actual output sits from its natural level \\(\\bar{Y}\\). Positive = boom, negative = recession.</dd>\n                                    <dt>Natural level of output (\\(\\bar{Y}\\))</dt>\n                                    <dd>Output at flexible prices and normal capacity use; the long-run anchor.</dd>\n                                    <dt>Inflation target (\\(\\pi^\\star\\))</dt>\n                                    <dd>The inflation rate the central bank aims for (e.g. 2%), to which the system returns in the long run.</dd>\n                                    <dt>Demand shock (\\(\\epsilon_t\\))</dt>\n                                    <dd>An exogenous shift in aggregate demand (e.g. fiscal policy, sentiment, exports). Shifts the DAD curve.</dd>\n                                    <dt>Supply shock (\\(\\nu_t\\))</dt>\n                                    <dd>An exogenous shift in inflation at a given output gap (e.g. oil prices). Shifts the DAS curve.</dd>\n                                    <dt>\\(\\gamma\\) &mdash; demand sensitivity</dt>\n                                    <dd>How strongly output responds to inflation gaps (it bakes in how aggressive policy is). Higher \\(\\gamma\\) &rArr; faster stabilisation.</dd>\n                                    <dt>\\(\\phi\\) &mdash; slope of the Phillips curve</dt>\n                                    <dd>How strongly inflation responds to the output gap. Higher \\(\\phi\\) &rArr; more flexible prices.</dd>\n                                    <dt>Impulse-response function (IRF)</dt>\n                                    <dd>The time path of a variable's response to a one-off shock &mdash; it shows the peak response, persistence and return to equilibrium.</dd>\n                                    <dt>Half-life</dt>\n                                    <dd>The number of periods until half of the initial shock has worn off: \\(\\ln 0.5/\\ln a\\) with \\(a=\\tfrac{1}{1+\\gamma\\phi}\\).</dd>\n                                </dl>\n                            ", "backtomenu-button1": "<span class=\"btn-text\">Variables &amp; Equations</span>", "start-model-button": "<span class=\"btn-text\">Interactive Diagram</span>", "backtomenu-button": "<span class=\"btn-text\">Variables &amp; Equations</span>", "graph-button": "<span class=\"btn-text\">Interactive Diagram</span>", "i18n-instr": "\n          Click any exogenous variable to select it.\n      ", "i18n-scentitle": "Scenarios", "i18n-sc1": "Demand shock<small>Boom &amp; inflation</small>", "i18n-sc2": "Supply shock<small>Stagflation</small>", "i18n-sc3": "Demand shock<small>Recession</small>", "i18n-sc4": "Supply shock<small>Cheaper oil price</small>", "i18n-sc5": "Oil crisis 1970s<small>Persistent stagflation</small>", "i18n-sc6": "Fiscal expansion<small>Sustained boom</small>", "i18n-sc7": "Financial crisis 2008<small>Deep recession</small>", "i18n-sc8": "COVID-19 shock<small>Collapse &amp; inflation wave</small>", "dd-reset-btn": "Reset", "i18n-exvar": "Exogenous variables\n\n    ", "i18n-gt-demand": "Demand shock", "i18n-gt-supply": "Supply shock\n", "i18n-expar": "Exogenous parameters\n\n    ", "dd-savegif-btn": "Save GIF", "dd-play-label": "Animate adjustment", "explanation-text": "A higher value means small deviations of inflation from target lead to larger swings in the output gap.", "next-explanation": "Next", "next-explanation1": "Back", "i18n-irfcap": "\n      An <strong>impulse-response function (IRF)</strong> traces the path of the deviation\n      from equilibrium after a one-off shock. The figures below summarise the response.\n    ", "i18n-lbl1": "Peak inflation", "i18n-lbl2": "Peak output", "i18n-lbl3": "Half-life", "i18n-lbl4": "Cum. output loss", "irf-peak-pi-t": "Period –", "irf-peak-y-t": "Period –", "i18n-sub3": "periods to ½", "i18n-sub4": "Σ of deviations", "expl-plot2-discrete": "\n          <strong>Adjustment of the inflation rate (demand or supply shock)</strong>\n\n          <!-- Supply Shock Part -->\n          <p>\n            <em>Pure supply shock</em>\n            (\\(\\nu_t \\neq 0\\), \\(\\epsilon_t = 0\\)):\n            <br><br>\n            Iterating forward gives:\n            \\[\n              \\pi_t\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\nu_t}{\\,1 + \\gamma\\,\\phi\\,}\n              \\qquad\n              \\pi_{t+1}\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\nu_t}{\\,(1 + \\gamma\\,\\phi)^2\\,}\n              \\qquad\n              \\pi_{t+2}\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\nu_t}{\\,(1 + \\gamma\\,\\phi)^3\\,}\n              \\quad\n            \\]\n          </p>\n\n          <!-- Demand Shock Part -->\n          <p>\n            <em>Pure demand shock</em>\n            (\\(\\epsilon_t \\neq 0\\), \\(\\nu_t = 0\\)):\n            <br><br>\n            Iterating forward gives:\n            \\[\n              \\pi_t\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\kappa\\,\\phi\\,\\epsilon_t}{\\,1 + \\gamma\\,\\phi\\,}\n              \\qquad\n              \\pi_{t+1}\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\kappa\\,\\phi\\,\\epsilon_t}{\\,(1 + \\gamma\\,\\phi)^2\\,}\n              \\qquad\n              \\pi_{t+2}\n              \\;=\\;\n              \\pi^{\\star}\n              \\;+\\;\n              \\frac{\\kappa\\,\\phi\\,\\epsilon_t}{\\,(1 + \\gamma\\,\\phi)^3\\,}\n              \\quad\n            \\]\n          </p>\n\n          <p>For the shock to die out we need \\(\\gamma\\phi>0\\).</p>\n          <p>The figures in the table are rounded to two decimal places.</p>\n        ", "expl-plot2-matrix": "\n          <strong>Adjustment of the inflation rate (matrix / state-space form)</strong>\n\n          <p>\n            Define \\(D = 1 + \\gamma\\phi\\). the inflation dynamics can be written compactly as a linear recursion:\n            \\[\n              \\pi_{t+1} = a\\,\\pi_t + b + c_\\epsilon\\,\\epsilon_{t+1} + c_\\nu\\,\\nu_{t+1}.\n            \\]\n            with the coefficients:\n            \\[\n              a = 1 - \\frac{\\phi\\gamma}{D}, \\qquad\n              b = \\frac{\\phi\\gamma}{D}\\,\\pi^\\star, \\qquad\n              c_\\epsilon = \\frac{\\phi\\kappa}{D}, \\qquad\n              c_\\nu = 1 - \\frac{\\phi\\gamma}{D}.\n            \\]\n          </p>\n\n          <p>\n            In matrix form (augmented state) this becomes:\n            \\[\n              \\begin{pmatrix}\\pi_{t+1}\\\\1\\end{pmatrix}\n              =\n              \\underbrace{\\begin{pmatrix}a & b\\\\0 & 1\\end{pmatrix}}_{A}\n              \\begin{pmatrix}\\pi_t\\\\1\\end{pmatrix}\n              +\n              \\underbrace{\\begin{pmatrix}c_\\epsilon & c_\\nu\\\\0 & 0\\end{pmatrix}}_{B}\n              \\begin{pmatrix}\\epsilon_{t+1}\\\\\\nu_{t+1}\\end{pmatrix}.\n            \\]\n            This form is convenient because you can iterate quickly over many periods\n            (this is exactly how the simulation in the code works).\n          </p>\n\n          <p>\n            If no further shocks occur after a one-off shock (\\(\\epsilon=\\nu=0\\) für \\(t+k\\ge1\\)),\n            then:\n            \\[\n              \\pi_{t+k} - \\pi^\\star = a^k\\,(\\pi_t - \\pi^\\star),\n            \\]\n            i.e. geometric decay. Stability requires \\(|a|<1\\), which here, with \\(\\gamma\\phi>0\\) is satisfied.\n          </p>\n        ", "expl-plot3-discrete": "\n          <strong>Adjustment of output (supply or demand shock)</strong>\n\n          <p>\n            <em>Pure demand shock</em>\n            (\\(\\epsilon_t \\neq 0\\), \\(\\nu_t = 0\\)):\n            <br><br>\n            Iterating forward gives:\n            \\[\n              Y_t \\;=\\; \\bar{Y}\n              \\;+\\;\n              \\frac{\\kappa\\,\\epsilon_t}{\\,1 + \\gamma\\,\\phi\\,}\n              \\qquad\n              Y_{t+1} \\;=\\; \\bar{Y}\n              \\;-\\;\n              \\frac{\\kappa\\,\\epsilon_t}{\\,(1 + \\gamma\\,\\phi)^2\\,}\n              \\qquad\n              Y_{t+2} \\;=\\; \\bar{Y}\n              \\;-\\;\n              \\frac{\\kappa\\,\\epsilon_t}{\\,(1 + \\gamma\\,\\phi)^3\\,}\n              \\quad\n            \\]\n          </p>\n\n          <p>\n            <em>Pure supply shock</em>\n            (\\(\\nu_t \\neq 0\\), \\(\\epsilon_t = 0\\)):\n            <br><br>\n            Iterating forward gives:\n            \\[\n              Y_t \\;=\\; \\bar{Y}\n              \\;-\\;\n              \\frac{\\gamma\\,\\nu_t}{\\,1 + \\gamma\\,\\phi\\,}\n              \\qquad\n              Y_{t+1} \\;=\\; \\bar{Y}\n              \\;-\\;\n              \\frac{\\gamma\\,\\nu_t}{\\,(1 + \\gamma\\,\\phi)^2\\,}\n              \\qquad\n              Y_{t+2} \\;=\\; \\bar{Y}\n              \\;-\\;\n              \\frac{\\gamma\\,\\nu_t}{\\,(1 + \\gamma\\,\\phi)^3\\,}\n              \\quad\n            \\]\n          </p>\n\n          <p>The figures in the table are rounded to two decimal places.</p>\n        ", "expl-plot3-matrix": "\n          <strong>Adjustment of output (matrix / state-space form)</strong>\n\n          <p>\n            In the model, output is computed from inflation and the shocks:\n            \\[\n              Y_{t+1} = \\bar{Y} - \\gamma(\\pi_{t+1}-\\pi^\\star) + \\kappa\\,\\epsilon_{t+1}.\n            \\]\n            Combining this with the compact inflation recursion\n            \\[\n              \\pi_{t+1} = a\\,\\pi_t + b + c_\\epsilon\\,\\epsilon_{t+1} + c_\\nu\\,\\nu_{t+1},\n            \\]\n            gives \\(Y_{t+1}\\) as a linear function of \\(\\pi_t\\) and the shocks.\n          </p>\n\n          <p>\n            In state-space notation we can define:\n            \\[\n              s_t=\\begin{pmatrix}\\pi_t\\\\1\\end{pmatrix}, \\quad\n              u_{t+1}=\\begin{pmatrix}\\epsilon_{t+1}\\\\\\nu_{t+1}\\end{pmatrix}, \\quad\n              s_{t+1}=A s_t + B u_{t+1}.\n            \\]\n            Output is then a linear “measurement equation”:\n            \\[\n              Y_{t+1} = \\bar{Y} - \\gamma\\left([1\\;0]\\,s_{t+1}-\\pi^\\star\\right) + \\kappa\\,\\epsilon_{t+1}.\n            \\]\n            This form is especially convenient because the dynamics can be iterated efficiently over many periods.\n          </p>\n        ", "show-latex-plot2": "Show calculation steps", "show-latex-plot3": "Show calculation steps", "i18n-view2": "<strong>View:</strong>", "i18n-view3": "<strong>View:</strong>", "i18n-disc2": "Discrete", "i18n-disc3": "Discrete", "i18n-welcome": "Welcome to the DAS-DAD Model", "i18n-startp": "Click the circle to launch the model.", "i18n-subjchange": "Subject to change."};
  window.T2 = function (en, de) { return window.LANG === "de" ? de : en; };
  function ddSetLang(lang) {
    window.LANG = (lang === "de") ? "de" : "en";
    var touched = [];
    for (var id in EN_BLOCKS) {
      var el = document.getElementById(id);
      if (!el) continue;
      el.innerHTML = (window.LANG === "de") ? (DE_BLOCKS[id] != null ? DE_BLOCKS[id] : EN_BLOCKS[id]) : EN_BLOCKS[id];
      touched.push(el);
    }
    if (window.ddShowVar && window.__ddVar) {
      var box = document.getElementById("variable-info-container");
      if (box && box.style.display !== "none") { try { window.ddShowVar(window.__ddVar); } catch (e) {} }
    }
    if (typeof updatePlots === "function") { try { updatePlots(); } catch (e) {} }
    if (window.MathJax && MathJax.typesetPromise) { try { MathJax.typesetPromise(touched); } catch (e) {} }
  }
  window.ddApplyLanguage = ddSetLang;

})();
</script>

<!-- Script to Open Model in New Tab -->
<script>
  function openModel() {
    var template = document.getElementById('model-template');
    var modelContent = template.innerHTML;

    // Replace current page with the model (no popup → works on load)
    document.open();
    document.write(modelContent);
    document.close();
  }
</script>

<script>
  window.addEventListener("DOMContentLoaded", () => {
    openModel();
  });
</script>
