.switch {
  position: relative;

  width: 60px;

 display:none;

.toggle-slide {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: var(--main-blue);
  -webkit-transition: .4s;
  transition: .4s;
}

.toggle-slide:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  -webkit-transition: .4s;
  transition: .4s;
}

input:checked + .toggle-slide {
  /*background-color: #ccc;*/
  background-color: var(--main-blue);
}

input:focus + .toggle-slide {
  box-shadow: 0 0 1px #2196F3;
}

input:checked + .toggle-slide:before {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
  content: "";
}

/* Rounded sliders */
.toggle-slide.round {
  border-radius: 34px;
}

.toggle-slide.round:before {
  border-radius: 50%;
}

  transition: height .2s ease;
}

}

  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
  content: "";
}

/* The pulsing highlight is done via a pseudo-element: */
.equation-highlight.intro-highlight::after {
  content: "";
  pointer-events: none;
  position: absolute;
  top: -3px;
  left: -8px;
  right: -8px;
  bottom: -3px;
  border-radius: 8px;           /* adjust corners as needed */
  border: 3px solid #4facfe;    /* base color */
  box-shadow: 0 0 10px #4facfe; /* glow */
  animation: pulseGlow 1.5s ease-in-out infinite;
}

/* The pulsing @keyframes: cycles color/box-shadow over 1.5s repeatedly. */
@keyframes pulseGlow {
  0% {
    box-shadow: 0 0 10px #4facfe;
    border-color: #4facfe;
  }
  50% {
    box-shadow: 0 0 20px #00f2fe;
    border-color: #00f2fe;

  100% {

}

        <!-- DISCRETE (your original content) -->
        <div id="expl-plot2-discrete" style="margin-top: 8px;">
          <strong>Anpassung der Inflationsrate (Nachfrage- oder Angebotsschock)</strong>

          <!-- Supply Shock Part -->
          <p>
            <em>Reiner Angebotsschock</em>
            (\(\nu_t \neq 0\), \(\epsilon_t = 0\)):
            <br><br>
            Dann ergibt sich iterativ:
            \[
              \pi_t
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\nu_t}{\,1 + \gamma\,\phi\,}
              \qquad
              \pi_{t+1}
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\nu_t}{\,(1 + \gamma\,\phi)^2\,}
              \qquad
              \pi_{t+2}
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\nu_t}{\,(1 + \gamma\,\phi)^3\,}
              \quad
            \]
          </p>

          <!-- Demand Shock Part -->
          <p>
            <em>Reiner Nachfrageschock</em>
            (\(\epsilon_t \neq 0\), \(\nu_t = 0\)):
            <br><br>
            Dann ergibt sich iterativ:
            \[
              \pi_t
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\kappa\,\phi\,\epsilon_t}{\,1 + \gamma\,\phi\,}
              \qquad
              \pi_{t+1}
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\kappa\,\phi\,\epsilon_t}{\,(1 + \gamma\,\phi)^2\,}
              \qquad
              \pi_{t+2}
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\kappa\,\phi\,\epsilon_t}{\,(1 + \gamma\,\phi)^3\,}
              \quad
            \]
          </p>

          <p>Damit der Schock verschwindet, benötigen wir \(\gamma\phi>0\).</p>
          <p>Die dargestellten Resultate in der Tabelle wurden auf zwei Nachkommastellen gerundet.</p>
        </div>

        <!-- MATRIX (new content) -->
        <div id="expl-plot2-matrix" style="margin-top: 8px; display: none;">
          <strong>Anpassung der Inflationsrate (Matrix-/Zustandsraum-Darstellung)</strong>

          <p>
            Definiere \(D = 1 + \gamma\phi\). Die Inflationsdynamik kann kompakt als lineare Rekursion geschrieben werden:
            \[
              \pi_{t+1} = a\,\pi_t + b + c_\epsilon\,\epsilon_{t+1} + c_\nu\,\nu_{t+1}.
            \]
            Dabei sind die Koeffizienten:
            \[
              a = 1 - \frac{\phi\gamma}{D}, \qquad
              b = \frac{\phi\gamma}{D}\,\pi^\star, \qquad
              c_\epsilon = \frac{\phi\kappa}{D}, \qquad
              c_\nu = 1 - \frac{\phi\gamma}{D}.
            \]
          </p>

          <p>
            In Matrixform (augmentierter Zustand) ergibt sich:
            \[
              \begin{pmatrix}\pi_{t+1}\\1\end{pmatrix}
              =
              \underbrace{\begin{pmatrix}a & b\\0 & 1\end{pmatrix}}_{A}
              \begin{pmatrix}\pi_t\\1\end{pmatrix}
              +
              \underbrace{\begin{pmatrix}c_\epsilon & c_\nu\\0 & 0\end{pmatrix}}_{B}
              \begin{pmatrix}\epsilon_{t+1}\\\nu_{t+1}\end{pmatrix}.
            \]
            Diese Darstellung ist praktisch, weil man über viele Perioden schnell iterieren kann
            (genau so arbeitet die effiziente Simulation im Code).
          </p>

          <p>
            Falls nach einem einmaligen Schock keine weiteren Schocks auftreten (\(\epsilon=\nu=0\) für \(t+k\ge1\)),
            dann gilt:
            \[
              \pi_{t+k} - \pi^\star = a^k\,(\pi_t - \pi^\star),
            \]
            d.h. geometrisches Abklingen. Stabilität entspricht \(|a|<1\), was hier bei \(\gamma\phi>0\) erfüllt ist.
          </p>
        </div>

            (\(\epsilon_t \neq 0\), \(\nu_t = 0\)):

            Dann ergibt sich iterativ:
            \[
              Y_t \;=\; \bar{Y}

              \frac{\kappa\,\epsilon_t}{\,1 + \gamma\,\phi\,}
              \qquad
              Y_{t+1} \;=\; \bar{Y}

              \frac{\kappa\,\epsilon_t}{\,(1 + \gamma\,\phi)^2\,}

              Y_{t+2} \;=\; \bar{Y}
              \;-\;
              \frac{\kappa\,\epsilon_t}{\,(1 + \gamma\,\phi)^3\,}
              \quad

          </p>

          <p>
            <em>Reiner Angebotsschock</em>
            (\(\nu_t \neq 0\), \(\epsilon_t = 0\)):
            <br><br>
            Dann ergibt sich iterativ:
            \[
              Y_t \;=\; \bar{Y}
              \;-\;
              \frac{\gamma\,\nu_t}{\,1 + \gamma\,\phi\,}
              \qquad
              Y_{t+1} \;=\; \bar{Y}
              \;-\;
              \frac{\gamma\,\nu_t}{\,(1 + \gamma\,\phi)^2\,}
              \qquad
              Y_{t+2} \;=\; \bar{Y}
              \;-\;
              \frac{\gamma\,\nu_t}{\,(1 + \gamma\,\phi)^3\,}
              \quad
            \]

        <!-- MATRIX (new content) -->
        <div id="expl-plot3-matrix" style="margin-top: 8px; display: none;">
          <strong>Anpassung des Outputs (Matrix-/Zustandsraum-Darstellung)</strong>

          <p>
            Der Output wird im Modell aus Inflation und Schocks berechnet:
            \[
              Y_{t+1} = \bar{Y} - \gamma(\pi_{t+1}-\pi^\star) + \kappa\,\epsilon_{t+1}.
            \]
            Kombiniert man dies mit der kompakten Inflationsrekursion
            \[
              \pi_{t+1} = a\,\pi_t + b + c_\epsilon\,\epsilon_{t+1} + c_\nu\,\nu_{t+1},
            \]
            erhält man \(Y_{t+1}\) als lineare Funktion von \(\pi_t\) und den Schocks.
          </p>

          <p>
            In Zustandsraum-Schreibweise kann man definieren:
            \[
              s_t=\begin{pmatrix}\pi_t\\1\end{pmatrix}, \quad
              u_{t+1}=\begin{pmatrix}\epsilon_{t+1}\\\nu_{t+1}\end{pmatrix}, \quad
              s_{t+1}=A s_t + B u_{t+1}.
            \]
            Der Output ist dann eine lineare “Messgleichung”:
            \[
              Y_{t+1} = \bar{Y} - \gamma\left([1\;0]\,s_{t+1}-\pi^\star\right) + \kappa\,\epsilon_{t+1}.
            \]
            Diese Form ist besonders praktisch, weil man die Entwicklung über viele Perioden effizient iterieren kann.
          </p>
        </div>

        <div class="variables-intro-container">
            <h3>Lösung: Kontrollfrage 2</h3>
        </div>
        <div class="variables-intro-container">
  <p>
    Das Modell:
  </p>
  <p>
  \[
  \begin{aligned}
  \text{(DAD)} \quad &Y_t \;=\; \bar{Y} \;-\; \gamma \,(\pi_t - \pi^\star) \;+\; \kappa \,\epsilon_t,\\
  \text{(DAS)} \quad &\pi_t \;=\; \pi_{t-1} \;+\; \phi\,(Y_t - \bar{Y}) \;+\; \nu_t.
  \end{aligned}
  \]
  Da zum Zeitpunkt \(t-1\) Gleichgewicht vorliegt, gilt \(\pi_{t-1} = \pi^\star\). Somit
  \[
      \pi_t \;=\; \pi^\star \;+\; \phi\,(Y_t - \bar{Y}) \;+\; \nu_t.
  \]
  </p>

  <p>
    Setzen wir dies in die DAD-Gleichung ein. Zunächst
    \[
        \pi_t - \pi^\star
        \;=\;
        \phi\,(Y_t - \bar{Y})
        \;+\;
        \nu_t.
    \]
    Dann
    \[
        Y_t
        \;=\;
        \bar{Y}
        \;-\;
        \gamma \Bigl[\phi\,(Y_t - \bar{Y}) \;+\; \nu_t\Bigr]
        \;+\;
        \kappa\,\epsilon_t.
    \]
    Verteilen wir \(\gamma\) und gruppieren nach \(Y_t\):
    \[
        Y_t
        \;=\;
        \bar{Y}
        \;-\;
        \gamma\phi\, (Y_t - \bar{Y})
        \;-\;
        \gamma\,\nu_t
        \;+\;
        \kappa\,\epsilon_t.
    \]
    \[
        Y_t
        \;+\;
        \gamma\phi \,(Y_t - \bar{Y})
        \;=\;
        \bar{Y}
        \;-\;
        \gamma\,\nu_t
        \;+\;
        \kappa\,\epsilon_t.
    \]
    \[
        Y_t
        \;+\;
        \gamma\phi\,Y_t
        \;-\;
        \gamma\phi\,\bar{Y}
        \;=\;
        \bar{Y}
        \;-\;
        \gamma\,\nu_t
        \;+\;
        \kappa\,\epsilon_t.
    \]
    \[
        (1 + \gamma\phi)\,Y_t
        \;=\;
        \bar{Y} + \gamma\phi\,\bar{Y}
        \;-\;
        \gamma\,\nu_t
        \;+\;
        \kappa\,\epsilon_t
        \;=\;
        \bar{Y}\,(1 + \gamma\phi)
        \;-\;
        \gamma\,\nu_t
        \;+\;
        \kappa\,\epsilon_t.
    \]
    Somit
    \[
        \boxed{
          Y_t
          \;=\;
          \bar{Y}
          \;-\;
          \frac{\gamma}{1 + \gamma\phi}\,\nu_t
          \;+\;
          \frac{\kappa}{1 + \gamma\phi}\,\epsilon_t.
        }
    \]
  </p>

  <p>
    Für \(\pi_t\) setzen wir \(Y_t\) zurück in
    \[
        \pi_t
        \;=\;
        \pi^\star
        \;+\;
        \phi \,\bigl(Y_t - \bar{Y}\bigr)
        \;+\;
        \nu_t.
    \]
    Weil \(Y_t - \bar{Y}\) aus obiger Formel gerade
    \(\displaystyle
      \bigl[\bar{Y} - \tfrac{\gamma}{1+\gamma\phi}\nu_t + \tfrac{\kappa}{1+\gamma\phi}\epsilon_t \bigr]
      \;-\;\bar{Y}
      =
      -\,\tfrac{\gamma}{1 + \gamma\phi}\,\nu_t
      \;+\;
      \tfrac{\kappa}{1 + \gamma\phi}\,\epsilon_t,
    \)
    erhalten wir
  </p>

  <p>
  \[
  \begin{aligned}
      \pi_t
      &= \pi^\star
         \;+\;
         \nu_t
         \;+\;
         \tfrac{\phi}{1 + \gamma\phi}\Bigl(-\,\gamma\,\nu_t + \kappa\,\epsilon_t\Bigr)
         \\
      &= \pi^\star
         \;+\;
         \frac{1}{\,1 + \gamma\phi\,}\,\nu_t
         \;+\;
         \frac{\kappa\,\phi}{\,1 + \gamma\phi\,}\,\epsilon_t.
  \end{aligned}
  \]
  </p>

  <p>
    Das sind die allgemeinen Formeln in Abhängigkeit von beiden Schock-Größen 
    \(\nu_t\) (Angebot) und \(\epsilon_t\) (Nachfrage).
  </p>

        <div class="variables-intro-container">
            <h3>Spezifische Schocks</h3>
        </div>

  <p>
    <strong>1. Reiner Angebotsschock</strong> (\(\epsilon_t = 0\)):
    \[
      Y_t
      = \bar{Y}
      \;-\;
      \frac{\gamma}{1 + \gamma\phi}\,\nu_t,
      \quad
      \pi_t
      = \pi^\star
      \;+\;
      \frac{1}{1 + \gamma\phi}\,\nu_t.
    \]
  </p>

  <p>
    <strong>2. Reiner Nachfrageschock</strong> (\(\nu_t = 0\)):
    \[
      Y_t
      = \bar{Y}
      \;+\;
      \frac{\kappa}{1 + \gamma\phi}\,\epsilon_t,
      \quad
      \pi_t
      = \pi^\star
      \;+\;
      \frac{\kappa\,\phi}{1 + \gamma\phi}\,\epsilon_t.
    \]
  </p>
  
    <p>
      <strong>Lösung:</strong> Das gesuchte Outputniveau beträgt <strong>99.92</strong> Einheiten.
    </p>

    und erst <em>nach</em> allen algebraischen Schritten auf zwei Stellen runden.
  </p>

    "Y_t": `
        <!-- Point 6 -->
        <details>
            <summary>Ausgangspunkt</summary>
            <div class="collapsible-content">

        <!-- Point 1 -->
       
        <details>
            <summary>1. Ausgangspunkt: IS-Kurve</summary>
            <p>
                Die IS-Kurve repräsentiert das Gleichgewicht auf dem Gütermarkt und zeigt die Beziehung zwischen dem Realzins und dem Output:
            </p>
            \\[
            Y_t = \\bar{Y} - \\alpha (r_t - r^*) + \\varepsilon_t
            \\]
            <p>Wobei:</p>
            <ul class="aligned-list">
                <li><span class="variable-name">\\( Y_t \\):</span> Reales Outputniveau zum Zeitpunkt \\( t \\).</li>
                <li><span class="variable-name">\\( \\bar{Y} \\):</span> Natürliches Outputniveau.</li>
                <li><span class="variable-name">\\( \\alpha > 0 \\):</span> Sensitivität des Outputs gegenüber dem Realzins.</li>
                <li><span class="variable-name">\\( r_t \\):</span> Realzinssatz zum Zeitpunkt \\( t \\).</li>
                <li><span class="variable-name">\\( r^* \\):</span> Natürlicher Realzins.</li>
                <li><span class="variable-name">\\( \\varepsilon_t \\):</span> Nachfrage-Schock.</li>
            </ul>
        </details>


        <!-- Point 2 -->
        <details>
            <summary>2. Geldpolitische Regel</summary>
            <p>
                Die Zentralbank setzt den Nominalzins gemäß einer Taylor-Regel:
            </p>
            \\[
            i_t = \\pi_t + r^* + \\theta_\\pi (\\pi_t - \\pi^*) + \\theta_Y (Y_t - \\bar{Y})
            \\]
            <p>Wobei:</p>
            <ul class="aligned-list">
                <li><span class="variable-name">\\( i_t \\):</span> Nominalzinssatz zum Zeitpunkt \\( t \\)</li>
                <li><span class="variable-name">\\( \\pi_t \\):</span> Inflationsrate zum Zeitpunkt \\( t \\)</li>
                <li><span class="variable-name">\\( \\pi^* \\):</span> Inflationsziel der Zentralbank</li>
                <li><span class="variable-name">\\( \\theta_\\pi > 0 \\):</span> Reaktionskoeffizient auf Inflationsabweichungen</li>
                <li><span class="variable-name">\\( \\theta_Y > 0 \\):</span> Reaktionskoeffizient auf Outputlücke</li>
            </ul>
        </details>

        <!-- Point 3 -->
        <details>
            <summary>3. Realzins</summary>
            <p>
                Der Realzins ergibt sich aus der Differenz zwischen Nominalzins und Inflation:
            </p>
            \\[
            r_t = i_t - \\pi_t

            \\end{aligned}
            \\]

            <summary>5. Realzinslücke</summary>
            <p>

            </p>
            \\[

            <p>

            <p>

            </p>
            \\[
            Y_t = \\bar{Y} - \\gamma (\\pi_t - \\pi^*) + \\kappa \\varepsilon_t
            \\]
            <p>Wobei:</p>
            \\[
            \\gamma = \\frac{ \\alpha \\theta_\\pi }{ 1 + \\alpha \\theta_Y }, \\quad \\kappa = \\frac{ 1 }{ 1 + \\alpha \\theta_Y }
            \\]
        </details>

        <!-- Point 9 -->
        <details>
            <summary>9. Interpretation</summary>
            <p>
                Der Parameter \\( \\gamma \\) misst die Empfindlichkeit der Outputlücke gegenüber Abweichungen der Inflation vom Zielwert. Ein höheres \\( \\gamma \\) bedeutet, dass kleine Abweichungen der Inflation vom Ziel zu größeren Veränderungen in der Outputlücke führen.
            </p>
            <p>
                \\( \\gamma \\) hängt ab von:
            </p>
            <ul class="aligned-list">
                <li><strong>\\( \\alpha \\):</strong> Höheres \\( \\alpha \\) erhöht \\( \\gamma \\), da das Outputniveau empfindlicher auf Zinsänderungen reagiert</li>
                <li><strong>\\( \\theta_\\pi \\):</strong> Ein höheres \\( \\theta_\\pi \\) bedeutet, dass die Zentralbank stärker auf Inflationsabweichungen reagiert, was zu größeren Realzinsänderungen und somit zu größeren Auswirkungen auf das Outputniveau führt</li>
                <li><strong>\\( \\theta_Y \\):</strong> Höheres \\( \\theta_Y \\) verringert \\( \\gamma \\), da die Zentralbank auch auf die Outputlücke reagiert und somit die Auswirkungen auf das Outputniveau abschwächt</li>
            </ul>
        </details>

        <!-- Point 10 -->
        <details>
            <summary>10. Zusammenfassung</summary>
            <p>
                \\( \\gamma \\) ist ein zentraler Parameter, der zeigt, wie das Outputniveau auf Abweichungen der Inflation vom Zielwert reagiert, unter Berücksichtigung der Reaktionen der Geldpolitik. Es verbindet die Nachfrageempfindlichkeit gegenüber dem Realzins mit der geldpolitischen Strategie der Zentralbank.
            </p>
        </details>
    `,
        "\\pi_t": "Inflationsrate zum Zeitpunkt \\( t \\).",
        "\\pi^\\star": "Inflationsziel der Zentralbank.",
            "\\kappa": `

        <!-- Point 1 -->
        <details>
            <summary>1. Ausgangspunkt: IS-Kurve mit Geldpolitik</summary>
            <div class="collapsible-content">
                <p>
                    Die IS-Kurve beschreibt das Gleichgewicht auf dem Gütermarkt und beinhaltet die Auswirkungen der Geldpolitik über den Zinssatz auf das Outputniveau:
                </p>
                \\[
                Y_t = \\bar{Y} - \\alpha (r_t - r^*) + \\varepsilon_t
                \\]
                <p>Wobei:</p>
                <ul class="aligned-list">
                    <li><span class="variable-name">\\( Y_t \\):</span> Reales Outputniveau zum Zeitpunkt \\( t \\)</li>
                    <li><span class="variable-name">\\( \\bar{Y} \\):</span> Natürliches Outputniveau</li>
                    <li><span class="variable-name">\\( \\alpha > 0 \\):</span> Sensitivität des Outputs gegenüber dem Realzins</li>
                    <li><span class="variable-name">\\( r_t \\):</span> Realzinssatz zum Zeitpunkt \\( t \\)</li>
                    <li><span class="variable-name">\\( r^* \\):</span> Natürlicher Realzins</li>
                    <li><span class="variable-name">\\( \\varepsilon_t \\):</span> Nachfrage-Schock zum Zeitpunkt \\( t \\)</li>
                </ul>
            </div>
        </details>

        <!-- Point 2 -->
        <details>
            <summary>2. Geldpolitische Reaktion auf Nachfrage-Schocks</summary>
            <div class="collapsible-content">
                <p>
                    Die Zentralbank reagiert auf Nachfrage-Schocks, um die Wirtschaft zu stabilisieren. Dies erfolgt über die Anpassung des Zinssatzes in Reaktion auf Veränderungen in der Outputlücke und der Inflation.
                </p>
                <p>
                    Allerdings kann die Geldpolitik nicht alle Nachfrage-Schocks vollständig ausgleichen, insbesondere wenn es Verzögerungen oder Unsicherheiten gibt.
                </p>
            </div>
        </details>
        <!-- Point 4 -->
        <!-- Point 5 -->
        <details>
            <summary>3. Einflussfaktoren</summary>
            <div class="collapsible-content">
                <p>
                    Der Wert von \\( \\kappa \\) hängt von mehreren Faktoren ab:
                </p>
                <ul class="aligned-list">
                    <li><strong>Reaktionsgeschwindigkeit der Geldpolitik:</strong> Eine schnellere Reaktion der Zentralbank reduziert \\( \\kappa \\)</li>
                    <li><strong>Präzision der Schockschätzung:</strong> Wenn die Zentralbank den Schock genauer messen kann, kann sie effektiver reagieren, was zu einem niedrigeren \\( \\kappa \\) führt</li>
                    <li><strong>Geldpolitische Instrumente:</strong> Die Verfügbarkeit und Wirksamkeit von geldpolitischen Instrumenten beeinflussen \\( \\kappa \\)</li>
                    <li><strong>Glaubwürdigkeit der Zentralbank:</strong> Hohe Glaubwürdigkeit kann die Effektivität der Geldpolitik erhöhen und \\( \\kappa \\) verringern</li>
                </ul>
            </div>
        </details>

        <!-- Point 6 -->
        <details>
            <summary>4. Zusammenhang mit der DAD-Kurve</summary>
            <div class="collapsible-content">
                <p>
                    In der Dynamischen Aggregierten Nachfrage (DAD)-Kurve spiegelt \\( \\kappa \\) den gedämpften Effekt von Nachfrage-Schocks wider:
                </p>
                \\[
                Y_t - \\bar{Y} = - \\gamma (\\pi_t - \\pi^*) + \\kappa \\varepsilon_t
                \\]
                <p>
                    Hier zeigt sich, dass nur der Teil \\( \\kappa \\varepsilon_t \\) des Schocks die Outputlücke beeinflusst.
                </p>
            </div>
        </details>
        <!-- Point 8 -->
        <details>
            <summary>5. Zusammenfassung</summary>
            <div class="collapsible-content">
                <p>
                    Der Parameter \\( \\kappa \\) quantifiziert den Anteil eines Nachfrage-Schocks, der nicht durch die Geldpolitik ausgeglichen wird. Er ist ein Maß für die Effektivität der Geldpolitik in der Stabilisierung der Wirtschaft gegenüber Nachfrage-Schocks.
                </p>
                <p>
                    Ein geringes \\( \\kappa \\) ist wünschenswert, da es bedeutet, dass die Zentralbank in der Lage ist, die Auswirkungen von Schocks auf das Outputniveau zu minimieren.
                </p>
            </div>
        </details>
    `,

            "\\phi": `

                </p>

function animateSlider(sliderId, targetValue) {
  const slider = document.getElementById(sliderId);
  let current = parseFloat(slider.value) || 0;
  const step = 1;
  const intervalId = setInterval(() => {
    if (current < targetValue) {
      current += step;
      if (current > targetValue) current = targetValue;
      slider.value = current;
      slider.dispatchEvent(new Event('input'));
      slider.dispatchEvent(new Event('change'));
    } else {
      clearInterval(intervalId);
    }
  }, 250);
}

// Function to adjust the gamma slider value to a specific target
function adjustGammaSlider(slider, targetValue, step) {
    var currentValue = parseFloat(slider.value);
    var intervalId = setInterval(function() {
        if (currentValue < targetValue) {
            currentValue += step;
            if (currentValue > targetValue) {
                currentValue = targetValue;
            }
        } else {
            clearInterval(intervalId); // Stop the interval if currentValue is not less than targetValue
        }
        slider.value = currentValue.toFixed(1); // Update the slider value
        slider.dispatchEvent(new Event('input')); // Trigger the input event to update the plot
        slider.dispatchEvent(new Event('change')); // Trigger the change event to update the plot
    }, 50);
}

  document.addEventListener("DOMContentLoaded", function () {
    function setup(selectId, discreteId, matrixId) {
      var select = document.getElementById(selectId);
      var discrete = document.getElementById(discreteId);
      var matrix = document.getElementById(matrixId);
      if (!select || !discrete || !matrix) return;

      function apply() {
        if (select.value === "matrix") {
          discrete.style.display = "none";
          matrix.style.display = "block";
        } else {
          matrix.style.display = "none";
          discrete.style.display = "block";
        }

        // Re-render MathJax when switching
        if (window.MathJax && MathJax.typesetPromise) {
          MathJax.typesetPromise([discrete, matrix]).catch(function (err) {
            console.error("MathJax error:", err);
          });
        }
      }

      select.addEventListener("change", apply);
      apply();
    }

    setup("expl-mode-plot2", "expl-plot2-discrete", "expl-plot2-matrix");
    setup("expl-mode-plot3", "expl-plot3-discrete", "expl-plot3-matrix");
