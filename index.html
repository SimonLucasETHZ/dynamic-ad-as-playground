.switch {
  position: relative;
  display: inline-block;
    align-items: center; /* Vertically centers the switch and labels */
    justify-content: center; /* Centers horizontally (optional) */
  width: 60px;
  height: 34px;
}

.switch input { 
 display:none;
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slide {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: var(--main-blue);
  -webkit-transition: .4s;
  transition: .4s;
}

.toggle-slide:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  -webkit-transition: .4s;
  transition: .4s;
}

input:checked + .toggle-slide {
  /*background-color: #ccc;*/
  background-color: var(--main-blue);
}

input:focus + .toggle-slide {
  box-shadow: 0 0 1px #2196F3;
}

input:checked + .toggle-slide:before {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
  content: "";
}

/* Rounded sliders */
.toggle-slide.round {
  border-radius: 34px;
}

.toggle-slide.round:before {
  border-radius: 50%;
}

/* underline lives on the <span>, not the button box */
.btn-text{
  position: relative;
}

.btn-text::after{
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;               /* sits on the text’s baseline */
  height: 0;
  background: #fff;
  transition: height .2s ease;
}

.options-button:hover .btn-text::after{
  height: 2px;             /* animate in */
}

        

/* ── hover: keep only the colour change you want ─────── */
.options-button:hover{
  color: #fff;                   /* redundant but harmless */
  /* removed box-shadow, border-color, etc. */
}

/* ── pressed / focused: do nothing visually ──────────── */
.options-button:active,
.options-button:focus{
  background: transparent;
  box-shadow: none;
  outline: none;                 /* <-- removes the dotted outline */
}

/* (Optional) Keep an accessible keyboard outline
   without the “shadow” look. Comment out if you don’t want it. */
.options-button:focus-visible{
  outline: 2px solid #fff;
  outline-offset: 2px;
}

.toggle-slide {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: var(--main-blue);
    transition: .4s;
    border-radius: 34px;
    height: 28px;
}

.toggle-slide:before {
    position: absolute;
    content: "";
    height: 22px;
    width: 22px;
    left: 6px;
    bottom: 3px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
}

input:checked + .toggle-slide {
  /*background-color: #ccc;*/
  background-color: var(--main-blue);
}

input:focus + .toggle-slide {
  box-shadow: 0 0 1px #2196F3;
}

input:checked + .toggle-slide:before {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
  content: "";
}

/* Rounded sliders */
.toggle-slide.round {
  border-radius: 34px;
}

.toggle-slide.round:before {
  border-radius: 50%;
}

  /* We'll ensure it displays as an inline-block or block
     so that it has a well-defined size for the pseudo-element. */
  display: inline-block; 
  position: relative; /* needed for the ::after to position absolutely */
}

/* The pulsing highlight is done via a pseudo-element: */
.equation-highlight.intro-highlight::after {
  content: "";
  pointer-events: none;
  position: absolute;
  top: -3px;
  left: -8px;
  right: -8px;
  bottom: -3px;
  border-radius: 8px;           /* adjust corners as needed */
  border: 3px solid #4338ca;    /* base color */
  box-shadow: 0 0 10px #4338ca; /* glow */
  animation: pulseGlow 1.5s ease-in-out infinite;
}

/* The pulsing @keyframes: cycles color/box-shadow over 1.5s repeatedly. */
@keyframes pulseGlow {
  0% {
    box-shadow: 0 0 10px #4338ca;
    border-color: #4338ca;
  }
  50% {
    box-shadow: 0 0 20px #7c5cff;
    border-color: #7c5cff;
  }
  100% {
    box-shadow: 0 0 10px #4338ca;
    border-color: #4338ca;
  }
}

                            <div class="dd-section" id="i18n-intro">
                                <span class="dd-kicker">Intermediate Macroeconomics</span>
                                <h2>The Dynamic AD-AS Model</h2>
                                <p class="dd-lead">
                                    The <strong>DAS-DAD model</strong> (Dynamic Aggregate Supply &ndash; Dynamic Aggregate
                                    Demand) describes how a country's output and inflation evolve
                                    <em>over time</em> once a shock hits. Unlike the static AD-AS diagram, it builds in
                                    explicit monetary policy (a Taylor rule), an expectations-augmented Phillips curve,
                                    and a difference equation that pulls the economy back to equilibrium
                                    period by period.
                                </p>
                            </div>

                            <div class="dd-glance" id="i18n-glance">
                                <span class="dd-chip">Time: <b>discrete</b> (\(t,\,t{+}1,\dots\))</span>
                                <span class="dd-chip">Endogenous: <b>\(Y_t,\ \pi_t\)</b></span>
                                <span class="dd-chip">Policy: <b>Taylor rule</b></span>
                                <span class="dd-chip">Stable when <b>\(\gamma\phi>0\)</b></span>
                                <span class="dd-chip">Textbook: <b>Mankiw, ch. 15</b><sup class="dd-cite" title="Mankiw, Macroeconomics - chapter 'A Dynamic Model of Economic Fluctuations'">[1]</sup></span>
                            </div>

                            <div class="dd-goals" id="i18n-goals">
                                <h3>Learning goals</h3>
                                <ul>
                                    <li><strong>Derive</strong> the two core equations (DAD &amp; DAS) and interpret them economically.</li>
                                    <li>Tell <strong>endogenous, exogenous and predetermined</strong> variables apart.</li>
                                    <li>Predict how a <strong>demand</strong> or <strong>supply shock</strong> feeds through to \(Y_t\) and \(\pi_t\).</li>
                                    <li>See the <strong>adjustment path</strong> back to equilibrium as geometric decay at rate \(a=\tfrac{1}{1+\gamma\phi}\).</li>
                                    <li>Read an <strong>impulse-response function</strong>: peak response, half-life and cumulative loss.</li>
                                    <li>Explain monetary policy's <strong>trade-off</strong> under supply shocks (output vs. inflation).</li>
                                </ul>
                            </div>

                            <div class="dd-callout history" id="i18n-history">
                                <span class="dd-callout-title">Where do these ideas come from?</span>
                                The Phillips curve goes back to <strong>A. W. Phillips (1958)</strong><sup class="dd-cite" title="Phillips (1958), Economica">[2]</sup>;
                                <strong>Friedman (1968)</strong> and <strong>Phelps (1967)</strong> added expectations and the
                                natural rate of unemployment<sup class="dd-cite" title="Friedman (1968), AER; Phelps (1967)">[3]</sup>.
                                <strong>Taylor (1993)</strong> formalised the monetary-policy reaction function<sup class="dd-cite" title="Taylor (1993), Carnegie-Rochester">[4]</sup>.
                                The textbook-style synthesis used here, without an LM curve, follows <strong>Romer (2000)</strong><sup class="dd-cite" title="Romer (2000), JEP - Keynesian Macro without the LM Curve">[5]</sup>
                                and <strong>Mankiw</strong><sup class="dd-cite" title="Mankiw, Macroeconomics">[1]</sup>; the modern micro-founded version is the
                                New Keynesian synthesis of <strong>Clarida, Gal&iacute; &amp; Gertler (1999)</strong><sup class="dd-cite" title="Clarida, Gali & Gertler (1999), JEL">[6]</sup>.
                                The full reference list is below.
                            </div>

                            <h2 id="i18n-eqh">Equations</h2>
                            <p id="i18n-eqp">Here is a short introduction and the derivation of the model. Click on any variable for more detail.</p>
  <div class="latex-equation" id="main-equation">
    \[
    \class{interactive-variable variable-Y_t}{Y_t} = \class{interactive-variable variable-ybar}{\bar{Y}} - \class{interactive-variable variable-gamma}{\gamma} \left( \class{interactive-variable variable-pit}{\pi_t} - \class{interactive-variable variable-pistsar}{\pi^\star} \right) + \class{interactive-variable variable-kappa}{\kappa} \class{interactive-variable variable-\epsilon_t}{\epsilon_t}
    \]
</div>
<div class="latex-equation">
    \[
    \class{interactive-variable variable-pit}{\pi_t} = \class{interactive-variable variable-pitm1}{\pi_{t-1}} + \class{interactive-variable variable-phi}{\phi} \left( \class{interactive-variable variable-Y_t}{Y_t} - \class{interactive-variable variable-ybar}{\bar{Y}} \right) + \class{interactive-variable variable-nut}{\nu_t}
    \]
</div>

</div>

                            <div class="dd-section" style="margin-top:34px;" id="i18n-stability">
                                <span class="dd-kicker">Mechanics</span>
                                <h2>Equilibrium, Dynamics &amp; Stability</h2>
                                <p>
                                    Substituting the DAD equation into the DAS equation gives a linear
                                    <strong>first-order difference equation</strong> for inflation:
                                </p>
                                \[
                                    \pi_t-\pi^\star=\underbrace{\frac{1}{1+\gamma\phi}}_{\textstyle a}\,(\pi_{t-1}-\pi^\star)
                                    \;+\;\frac{\phi\kappa}{1+\gamma\phi}\,\epsilon_t\;+\;\frac{1}{1+\gamma\phi}\,\nu_t .
                                \]
                                <p>
                                    After a one-off shock the gap from target decays geometrically:
                                    \(\pi_{t+k}-\pi^\star=a^{\,k}(\pi_t-\pi^\star)\). The system is <strong>stable</strong>
                                    as long as \(|a|<1\), i.e. \(\gamma\phi>0\) &mdash; the central bank (\(\gamma\)) and the
                                    Phillips curve (\(\phi\)) together pull the economy back to equilibrium.
                                </p>

                                <div class="dd-callout intuition">
                                    <span class="dd-callout-title">Intuition: why do shocks fade out?</span>
                                    When inflation runs above target, the central bank pushes real interest rates up
                                    (through the Taylor rule), cooling demand and therefore output. The resulting
                                    negative output gap then drags inflation back down via the Phillips curve. The more
                                    aggressively policy reacts (\(\gamma\)) and the steeper the Phillips curve (\(\phi\)),
                                    the faster the decay &mdash; the <em>half-life</em> is \(\ln 0.5/\ln a\) periods.
                                </div>

                                <div class="dd-callout supply">
                                    <span class="dd-callout-title">The monetary-policy trade-off</span>
                                    A <strong>demand shock</strong> moves output and inflation in the same direction &mdash;
                                    policy can stabilise both at once. A <strong>supply shock</strong>
                                    moves them in opposite directions (stagflation): fighting inflation deepens the recession.
                                    It is precisely this conflict that makes supply shocks so awkward for central banks.
                                </div>
                            </div>

                                <h2>Further Reading &amp; Sources</h2>
                                <p>The numbered references <sup class="dd-cite">[n]</sup> in the text point to this list.</p>
                                <ol class="dd-refs">

                            <div class="dd-section" id="glossar">
                                <span class="dd-kicker">Reference</span>
                                <h2>Glossary</h2>
                                <dl class="dd-glossary">
                                    <dt>Output gap (\(Y_t-\bar{Y}\))</dt>
                                    <dd>How far actual output sits from its natural level \(\bar{Y}\). Positive = boom, negative = recession.</dd>
                                    <dt>Natural level of output (\(\bar{Y}\))</dt>
                                    <dd>Output at flexible prices and normal capacity use; the long-run anchor.</dd>
                                    <dt>Inflation target (\(\pi^\star\))</dt>
                                    <dd>The inflation rate the central bank aims for (e.g. 2%), to which the system returns in the long run.</dd>
                                    <dt>Demand shock (\(\epsilon_t\))</dt>
                                    <dd>An exogenous shift in aggregate demand (e.g. fiscal policy, sentiment, exports). Shifts the DAD curve.</dd>
                                    <dt>Supply shock (\(\nu_t\))</dt>
                                    <dd>An exogenous shift in inflation at a given output gap (e.g. oil prices). Shifts the DAS curve.</dd>
                                    <dt>\(\gamma\) &mdash; demand sensitivity</dt>
                                    <dd>How strongly output responds to inflation gaps (it bakes in how aggressive policy is). Higher \(\gamma\) &rArr; faster stabilisation.</dd>
                                    <dt>\(\phi\) &mdash; slope of the Phillips curve</dt>
                                    <dd>How strongly inflation responds to the output gap. Higher \(\phi\) &rArr; more flexible prices.</dd>
                                    <dt>Impulse-response function (IRF)</dt>
                                    <dd>The time path of a variable's response to a one-off shock &mdash; it shows the peak response, persistence and return to equilibrium.</dd>
                                    <dt>Half-life</dt>
                                    <dd>The number of periods until half of the initial shock has worn off: \(\ln 0.5/\ln a\) with \(a=\tfrac{1}{1+\gamma\phi}\).</dd>
                                </dl>

          <strong>Adjustment of the inflation rate (demand or supply shock)</strong>

          <!-- Supply Shock Part -->
          <p>
            <em>Pure supply shock</em>
            (\(\nu_t \neq 0\), \(\epsilon_t = 0\)):
            <br><br>
            Iterating forward gives:
            \[
              \pi_t
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\nu_t}{\,1 + \gamma\,\phi\,}
              \qquad
              \pi_{t+1}
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\nu_t}{\,(1 + \gamma\,\phi)^2\,}
              \qquad
              \pi_{t+2}
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\nu_t}{\,(1 + \gamma\,\phi)^3\,}
              \quad
            \]
          </p>

          <!-- Demand Shock Part -->
          <p>
            <em>Pure demand shock</em>
            (\(\epsilon_t \neq 0\), \(\nu_t = 0\)):
            <br><br>
            Iterating forward gives:
            \[
              \pi_t
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\kappa\,\phi\,\epsilon_t}{\,1 + \gamma\,\phi\,}
              \qquad
              \pi_{t+1}
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\kappa\,\phi\,\epsilon_t}{\,(1 + \gamma\,\phi)^2\,}
              \qquad
              \pi_{t+2}
              \;=\;
              \pi^{\star}
              \;+\;
              \frac{\kappa\,\phi\,\epsilon_t}{\,(1 + \gamma\,\phi)^3\,}
              \quad
            \]
          </p>

          <p>For the shock to die out we need \(\gamma\phi>0\).</p>
          <p>The figures in the table are rounded to two decimal places.</p>
        </div>

        <!-- MATRIX (new content) -->
        <div id="expl-plot2-matrix" style="margin-top: 8px; display: none;">
          <strong>Adjustment of the inflation rate (matrix / state-space form)</strong>

          <p>
            Define \(D = 1 + \gamma\phi\). the inflation dynamics can be written compactly as a linear recursion:
            \[
              \pi_{t+1} = a\,\pi_t + b + c_\epsilon\,\epsilon_{t+1} + c_\nu\,\nu_{t+1}.
            \]
            with the coefficients:
            \[
              a = 1 - \frac{\phi\gamma}{D}, \qquad
              b = \frac{\phi\gamma}{D}\,\pi^\star, \qquad
              c_\epsilon = \frac{\phi\kappa}{D}, \qquad
              c_\nu = 1 - \frac{\phi\gamma}{D}.
            \]
          </p>

          <p>
            In matrix form (augmented state) this becomes:
            \[
              \begin{pmatrix}\pi_{t+1}\\1\end{pmatrix}
              =
              \underbrace{\begin{pmatrix}a & b\\0 & 1\end{pmatrix}}_{A}
              \begin{pmatrix}\pi_t\\1\end{pmatrix}
              +
              \underbrace{\begin{pmatrix}c_\epsilon & c_\nu\\0 & 0\end{pmatrix}}_{B}
              \begin{pmatrix}\epsilon_{t+1}\\\nu_{t+1}\end{pmatrix}.
            \]
            This form is convenient because you can iterate quickly over many periods
            (this is exactly how the simulation in the code works).
          </p>

          <p>
            If no further shocks occur after a one-off shock (\(\epsilon=\nu=0\) für \(t+k\ge1\)),
            then:
            \[
              \pi_{t+k} - \pi^\star = a^k\,(\pi_t - \pi^\star),
            \]
            i.e. geometric decay. Stability requires \(|a|<1\), which here, with \(\gamma\phi>0\) is satisfied.
          </p>
        </div>

            (\(\epsilon_t \neq 0\), \(\nu_t = 0\)):
            <br><br>
            Iterating forward gives:
            \[
              Y_t \;=\; \bar{Y}
              \;+\;
              \frac{\kappa\,\epsilon_t}{\,1 + \gamma\,\phi\,}
              \qquad
              Y_{t+1} \;=\; \bar{Y}
              \;-\;
              \frac{\kappa\,\epsilon_t}{\,(1 + \gamma\,\phi)^2\,}
              \qquad
              Y_{t+2} \;=\; \bar{Y}
              \;-\;
              \frac{\kappa\,\epsilon_t}{\,(1 + \gamma\,\phi)^3\,}
              \quad
            \]
          </p>

          <p>
            <em>Pure supply shock</em>
            (\(\nu_t \neq 0\), \(\epsilon_t = 0\)):
            <br><br>
            Iterating forward gives:
            \[
              Y_t \;=\; \bar{Y}
              \;-\;
              \frac{\gamma\,\nu_t}{\,1 + \gamma\,\phi\,}
              \qquad
              Y_{t+1} \;=\; \bar{Y}
              \;-\;
              \frac{\gamma\,\nu_t}{\,(1 + \gamma\,\phi)^2\,}
              \qquad
              Y_{t+2} \;=\; \bar{Y}
              \;-\;
              \frac{\gamma\,\nu_t}{\,(1 + \gamma\,\phi)^3\,}
              \quad
            \]
          </p>

          <p>The figures in the table are rounded to two decimal places.</p>
        </div>

        <!-- MATRIX (new content) -->
        <div id="expl-plot3-matrix" style="margin-top: 8px; display: none;">
          <strong>Adjustment of output (matrix / state-space form)</strong>

          <p>
            In the model, output is computed from inflation and the shocks:
            \[
              Y_{t+1} = \bar{Y} - \gamma(\pi_{t+1}-\pi^\star) + \kappa\,\epsilon_{t+1}.
            \]
            Combining this with the compact inflation recursion
            \[
              \pi_{t+1} = a\,\pi_t + b + c_\epsilon\,\epsilon_{t+1} + c_\nu\,\nu_{t+1},
            \]
            gives \(Y_{t+1}\) as a linear function of \(\pi_t\) and the shocks.
          </p>

          <p>
            In state-space notation we can define:
            \[
              s_t=\begin{pmatrix}\pi_t\\1\end{pmatrix}, \quad
              u_{t+1}=\begin{pmatrix}\epsilon_{t+1}\\\nu_{t+1}\end{pmatrix}, \quad
              s_{t+1}=A s_t + B u_{t+1}.
            \]
            Output is then a linear “measurement equation”:
            \[
              Y_{t+1} = \bar{Y} - \gamma\left([1\;0]\,s_{t+1}-\pi^\star\right) + \kappa\,\epsilon_{t+1}.
            \]
            This form is especially convenient because the dynamics can be iterated efficiently over many periods.
          </p>

ails> <!-- Point 8 --> <details> <summary>8. Solution</summary> <p> We isolate \( Y_t \): </p> \[ Y_t = \bar{Y} - \frac{ \alpha \theta_\pi }{ 1 + \alpha \theta_Y } (\pi_t - \pi^*) + \frac{ 1 }{ 1 + \alpha \theta_Y } \varepsilon_t \] <p> Note that the first term often simplifies to \( \bar{Y} \) if we assume that \( \bar{Y} \) is constant: </p> \[ Y_t = \bar{Y} - \gamma (\pi_t - \pi^*) + \kappa \varepsilon_t \] <p>where:</p> \[ \gamma = \frac{ \alpha \theta_\pi }{ 1 + \alpha \theta_Y }, \quad \kappa = \frac{ 1 }{ 1 + \alpha \theta_Y } \] </details> <!-- Point 9 --> <details> <summary>9. Interpretation</summary> <p> The parameter \( \gamma \) measures the sensitivity of the output gap to deviations of inflation from target. A higher \( \gamma \) means that small deviations of inflation from target lead to larger changes in the output gap. </p> <p> \( \gamma \) depends on: </p> <ul class=\"aligned-list\"> <li><strong>\( \alpha \):</strong> A higher \( \alpha \) increases \( \gamma \), because output reacts more sensitively to interest-rate changes</li> <li><strong>\( \theta_\pi \):</strong> A higher \( \theta_\pi \) means the central bank reacts more strongly to inflation deviations, leading to larger real-rate changes and hence larger effects on output</li> <li><strong>\( \theta_Y \):</strong> A higher \( \theta_Y \) reduces \( \gamma \), because the central bank also reacts to the output gap and thus dampens the effect on output</li> </ul> </details> <!-- Point 10 --> <details> <summary>10. Zusammenfassung</summary> <p> \( \gamma \) is a central parameter showing how output responds to deviations of inflation from target, taking the monetary-policy response into account. It links the sensitivity of demand to the real interest rate with the central bank's policy strategy. </p> </details>", "\pi_t": "Inflation rate at time \( t \).", "\pi^\star": "Central bank's inflation target.", "\kappa": "<!-- Point 1 --> <details> <summary>1. Starting point: IS curve with monetary policy</summary> <div class=\"collapsible-content\"> <p> The IS curve describes equilibrium in the goods market and incorporates the effect of monetary policy on output via the interest rate: </p> \[ Y_t = \bar{Y} - \alpha (r_t - r^*) + \varepsilon_t \] <p>where:</p> <ul class=\"aligned-list\"> <li><span class=\"variable-name\">\( Y_t \):</span> Real level of output at time \( t \)</li> <li><span class=\"variable-name\">\( \bar{Y} \):</span> Natural level of output</li> <li><span class=\"variable-name\">\( \alpha > 0 \):</span> Sensitivity of output to the real interest rate</li> <li><span class=\"variable-name\">\( r_t \):</span> real interest rate at time \( t \)</li> <li><span class=\"variable-name\">\( r^* \):</span> Natural real interest rate</li> <li><span class=\"variable-name\">\( \varepsilon_t \):</span> Demand shock at time \( t \)</li> </ul> </div> </details> <!-- Point 2 --> <details> <summary>2. Monetary-policy response to demand shocks</summary> <div class=\"collapsible-content\"> <p> The central bank responds to demand shocks to stabilise the economy, by adjusting the interest rate in reaction to changes in the output gap and inflation. </p> <p> However, monetary policy cannot fully offset all demand shocks, especially when there are lags or uncertainty. </p> </div> </details> <!-- Point 4 --> <!-- Point 5 --> <details> <summary>3. Einflussfaktoren</summary> <div class=\"collapsible-content\"> <p> The value of \( \kappa \) depends on several factors: </p> <ul class=\"aligned-list\"> <li><strong>Speed of the monetary-policy response:</strong> A faster central-bank response reduces \( \kappa \)</li> <li><strong>Precision of the shock estimate:</strong> If the central bank can measure the shock more accurately, it can respond more effectively, leading to a lower \( \kappa \)</li> <li><strong>Geldpolitische Instrumente:</strong> The availability and effectiveness of monetary-policy instruments affect \( \kappa \)</li> <li><strong>Credibility of the central bank:</strong> High credibility can increase the effectiveness of monetary policy and reduce \( \kappa \)</li> </ul> </div> </details> <!-- Point 6 --> <details> <summary>4. Relation to the DAD curve</summary> <div class=\"collapsible-content\"> <p> In the Dynamic Aggregate Demand (DAD) curve, \( \kappa \) reflects the dampened effect of demand shocks: </p> \[ Y_t - \bar{Y} = - \gamma (\pi_t - \pi^*) + \kappa \varepsilon_t \] <p> This shows that only the part \( \kappa \varepsilon_t \) of the shock affects the output gap. </p> </div> </details> <!-- Point 8 --> <details> <summary>5. Zusammenfassung</summary> <div class=\"collapsible-content\"> <p> The parameter \( \kappa \) quantifies the share of a demand shock that is not offset by monetary policy. It is a measure of how effectively monetary policy stabilises the economy against demand shocks. </p> <p> A low \( \kappa \) is desirable, as it means the central bank is able to minimise the effect of shocks on output. </p> </div> </details>", "\epsilon_t": "Demand shock at time \( t \).", "\pi_{t-1}": "Inflation rate at time \( t-1 \).", "\phi": "<!-- Point 1 --> <details> <summary>1. Starting point: Phillips curve</summary> <div class=\"collapsible-content\"> <p> The Phillips curve describes the relationship between inflation and unemployment. Combined with Okun's law, it gives: </p> \[ \pi_t = \pi_{t-1} + \phi (Y_t - \bar{Y}) + \nu_t \] <p>where:</p> <ul class=\"aligned-list\"> <li><span class=\"variable-name\">\( \pi_t \):</span> Inflation rate at time \( t \)</li> <li><span class=\"variable-name\">\( \pi_{t-1} \):</span> Inflation rate at time \( t-1 \)</li> <li><span class=\"variable-name\">\( \phi > 0 \):</span> Sensitivity of inflation to the output gap</li> <li><span class=\"variable-name\">\( Y_t \):</span> Actual level of output at time \( t \)</li> <li><span class=\"variable-name\">\( \bar{Y} \):</span> Natural level of output</li> <li><span class=\"variable-name\">\( \nu_t \):</span> Supply shock at time \( t \)</li> </ul> </div> </details> <!-- Point 2 --> <details> <summary>2. Adaptive expectations</summary> <div class=\"collapsible-content\"> <p> We assume expected inflation is based on adaptive expectations, i.e. agents expect future inflation to equal past inflation: </p> \[ E_{t-1} \pi_t = \pi_{t-1} \] <p> This gives the following relationship between the inflation rate and the output gap: </p> \[ \pi_t = E_{t-1} \pi_t + \phi (Y_t - \bar{Y}) + \nu_t \] </div> </details> <!-- Point 3 --> <!-- Point 4 --> <details> <summary>3. Interpretation</summary> <div class=\"collapsible-content\"> <p> The parameter \( \phi \) measures how sensitively inflation reacts to the output gap. A higher \( \phi \) means a given output gap leads to a larger change in inflation. </p> <p> Factors that affect \( \phi \): </p> <ul class=\"aligned-list\"> <li><strong>Price flexibility:</strong> In economies with more flexible prices, inflation reacts more strongly to changes in demand, leading to a higher \( \phi \)</li> <li><strong>Lohnverhandlungen:</strong> If wages adjust more quickly to changes in demand, this raises \( \phi \)</li> <li><strong>Capacity utilisation:</strong> When productive capacity is highly utilised, extra demand can lead to stronger price increases, which raises \( \phi \)</li> </ul> </div> </details> <!-- Point 5 --> <!-- Point 6 --> <details> <summary>4. Implications for monetary policy</summary> <div class=\"collapsible-content\"> <p> A higher \( \phi \) means the central bank must expect larger changes in inflation for a given output gap. This shapes the monetary-policy response to demand shocks. </p> <p> For example, a high \( \phi \) requires the central bank to react more aggressively to inflation in order to ensure price stability. </p> </div> </details> <!-- Point 7 --> <details> <summary>5. Zusammenfassung</summary> <div class=\"collapsible-content\"> <p> The parameter \( \phi \) is crucial for understanding the dynamics between the output gap and inflation. </p> </div> </details>", "\nu_t": "supply shock at time \( t \)."};

                option.classList.remove('wrong-answer');
            } else {
                option.classList.add('wrong-answer');
                option.classList.remove('correct-answer');
            }

            box.appendChild(option);
            
            updateResultMessageQ1();
        });
    });

function animateSlider(sliderId, targetValue) {
  const slider = document.getElementById(sliderId);
  let current = parseFloat(slider.value) || 0;
  const step = 1;
  const intervalId = setInterval(() => {
    if (current < targetValue) {
      current += step;
      if (current > targetValue) current = targetValue;
      slider.value = current;
      slider.dispatchEvent(new Event('input'));
      slider.dispatchEvent(new Event('change'));
    } else {
      clearInterval(intervalId);
    }
  }, 250);
}

// Function to adjust the gamma slider value to a specific target
function adjustGammaSlider(slider, targetValue, step) {
    var currentValue = parseFloat(slider.value);
    var intervalId = setInterval(function() {
        if (currentValue < targetValue) {
            currentValue += step;
            if (currentValue > targetValue) {
                currentValue = targetValue;
            }
        } else {
            clearInterval(intervalId); // Stop the interval if currentValue is not less than targetValue
        }
        slider.value = currentValue.toFixed(1); // Update the slider value
        slider.dispatchEvent(new Event('input')); // Trigger the input event to update the plot
        slider.dispatchEvent(new Event('change')); // Trigger the change event to update the plot
    }, 50);
}

<script>
(function () {
  "use strict";

  // Run after the written document has parsed.
  function ready(fn) {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fn);
    } else { fn(); }
  }

  // ---------- helpers --------------------------------------------------
  function $(id) { return document.getElementById(id); }

  // Reveal the slider group(s) tied to a model variable (mirrors app logic)
  function reveal(name) {
    if (typeof showSliderForVariable === 'function') {
      try { showSliderForVariable(name); return; } catch (e) {}
    }
    document.querySelectorAll('.slider-group1.variable-' + name)
      .forEach(function (el) { el.classList.remove('hidden'); });
  }

  // Panel sizing is now handled purely by CSS (absolute layout fills to the
  // disclaimer and scrolls internally), so this just clears any stale inline
  // height that an earlier version may have set.
  function ddSyncPanelHeight() {
    try {
      var panel = document.querySelector('.content-box .filter-menu');
      if (panel) { panel.style.height = ''; panel.style.maxHeight = ''; }
    } catch (e) { /* no-op */ }
  }
  // expose so other hooks can call it
  window.ddSyncPanelHeight = ddSyncPanelHeight;

  // Set a slider's value, sync its readout, fire input + change events
  function setVal(inputId, value) {
    var el = $(inputId);
    if (!el) return;
    el.value = value;
    // candidate readout ids: param style ("amount-<key>-value") and shock style
    var candidates = [
      inputId + '-value',
      inputId.replace('amount-input', 'amount-') + '-value'
    ];
    for (var i = 0; i < candidates.length; i++) {
      var span = $(candidates[i]);
      if (span) { span.textContent = el.value; break; }
    }
    el.dispatchEvent(new Event('input',  { bubbles: true }));
    el.dispatchEvent(new Event('change', { bubbles: true }));
  }

  // Baseline parameters (match the slider defaults; chosen so the decay
  // rate a = 1/(1+γφ) = 0.8 gives a gradual, textbook-like adjustment)
  var BASE = {
    'amount-inputybar': 5, 'amount-inputpistar': 5,
    'amount-inputgamma': 0.5, 'amount-inputphi': 0.5, 'amount-inputkappa': 0.7
  };
  var SHOCKS = [
    'amount-inputshockte', 'amount-inputshockte1',
    'amount-inputshockte2', 'amount-inputshockte3', 'amount-inputshockte4',
    'amount-inputshocktv', 'amount-inputshocktv1',
    'amount-inputshocktv2', 'amount-inputshocktv3', 'amount-inputshocktv4'
  ];

  function revealAll() {
    ['ybar', 'pistar', 'gamma', 'phi', 'kappa',
     'epsilon_t', 'nu_t', 'nu_t_plus_1'].forEach(reveal);
  }

  function applyBaseline() {
    revealAll();
    Object.keys(BASE).forEach(function (k) { setVal(k, BASE[k]); });
    SHOCKS.forEach(function (k) { setVal(k, 0); });
  }

  // Scenario definitions. Each runs on the baseline parameters above and then
  // applies a shock pattern. Demand shocks εₜ…εₜ₊₄ map to amount-inputshockte[1-4];
  // supply shocks νₜ…νₜ₊₄ map to amount-inputshocktv[1-4]. Range ±4, step 2.
  var SCENARIOS = {
    // --- canonical one-period shocks ---
    demandPos: { 'amount-inputshockte':  4 },                                   // boom + inflation
    demandNeg: { 'amount-inputshockte': -4 },                                   // recession
    supplyPos: { 'amount-inputshocktv':  4 },                                   // stagflation
    supplyNeg: { 'amount-inputshocktv': -4 },                                   // favourable supply

    // --- persistent / historical shocks often shown in the literature ---
    // 1970s oil crises: a large adverse supply shock that lingers (Mankiw, stagflation)
    oilCrisis:  { 'amount-inputshocktv': 4, 'amount-inputshocktv1': 2, 'amount-inputshocktv2': 2 },
    // Fiscal expansion: a sustained positive demand shock
    fiscalBoom: { 'amount-inputshockte': 4, 'amount-inputshockte1': 2, 'amount-inputshockte2': 2 },
    // Global Financial Crisis 2008: a deep, persistent demand collapse with slow recovery
    gfc:        { 'amount-inputshockte': -4, 'amount-inputshockte1': -4, 'amount-inputshockte2': -2 },

    // --- COVID-19: demand collapse (2020) that lingers into 2021, then a
    //     supply-driven inflation wave (2022). Output crashes, recovers ~70-75%,
    //     then climbs gradually back to potential (no overshoot, no second dip);
    //     inflation dips, then surges, then eases. ---

      'amount-inputshockte':  -4,   // 2020: lockdown demand/output collapse
      'amount-inputshockte1': -2,   // 2021: lingering demand drag → partial recovery
      'amount-inputshocktv2':  2    // 2022: supply-chain & energy inflation wave
    }
  };

  function ensureGraphView() {
    // make sure we are on the DAS-DAD diagram, not the quiz / IRF
    var toggle = $('plotToggle');
    if (toggle && toggle.checked) {
      toggle.checked = false;
      toggle.dispatchEvent(new Event('change', { bubbles: true }));
    } else if (typeof showPlot1 === 'function') {
      try { showPlot1(); } catch (e) {}
    }
  }

  function clearActivePresets() {
    document.querySelectorAll('.dd-preset.dd-active')
      .forEach(function (b) { b.classList.remove('dd-active'); });
  }
  function setActivePreset(btn) {
    clearActivePresets();
    if (btn) btn.classList.add('dd-active');
  }

  function runScenario(key) {
    applyBaseline();
    var s = SCENARIOS[key] || {};
    Object.keys(s).forEach(function (k) { setVal(k, s[k]); });
    if (typeof updatePlots === 'function') { try { updatePlots(); } catch (e) {} }
    ensureGraphView();
  }

  function resetAll() {
    clearActivePresets();
    applyBaseline();
    if (typeof updatePlots === 'function') { try { updatePlots(); } catch (e) {} }
    ensureGraphView();
    ddStopAnimation();
  }

  // ---------- IRF statistics ------------------------------------------
  function fmt(x, d) {
    if (x === null || x === undefined || !isFinite(x)) return '–';
    return (Math.round(x * Math.pow(10, d)) / Math.pow(10, d)).toFixed(d);
  }

  function peakOf(arr) { // returns {val, idx} of largest absolute deviation
    var best = 0, idx = 0;
    for (var k = 0; k < arr.length; k++) {
      if (Math.abs(arr[k]) > Math.abs(best)) { best = arr[k]; idx = k; }
    }
    return { val: best, idx: idx };
  }

  window.ddUpdateIRFStats = function (sim) {
    if (!sim) return;
    var pi = sim.piPath, y = sim.yPath;
    var piStar = sim.pistar, base = (sim.ybar != null ? sim.ybar : sim.baselineY);

    set('irf-peak-pi-t', (window.T2?window.T2('Period ','Periode '):'Period ') + (pPi.val === 0 ? '–' : pPi.idx));
    set('irf-peak-y',    (pY.val >= 0 ? '+' : '') + fmt(pY.val, 2));
    set('irf-peak-y-t',  (window.T2?window.T2('Period ','Periode '):'Period ') + (pY.val === 0 ? '–' : pY.idx));
    set('irf-halflife',  isFinite(half) ? fmt(half, 1) : '–');

  // ---------- Adjustment animation on the DAS-DAD diagram --------------

  function removeAnimTraces(gd) {
    if (!gd || !gd.data) return;

    gd.data.forEach(function (d, i) {
      if (d && (d._ddanim || d.name === 'Anpassungspfad')) idx.push(i);

      try { Plotly.deleteTraces(gd, idx); } catch (e) {}

  }

  function ddStopAnimation() {
    if (animTimer) { clearInterval(animTimer); animTimer = null; }
    var gd = $('plot1');
    removeAnimTraces(gd);
    setPlayIdle();
  }

  function setPlayIdle() {
    var b = $('dd-play-btn'), lab = $('dd-play-label'), ic = $('dd-play-icon');

    if (lab) lab.textContent = (window.T2?window.T2('Animate adjustment','Anpassung animieren'):'Animate adjustment');

        marker: { size: 14, color: '#7c5cff', line: { color: '#fff', width: 2 } },

          }).then(function (url) {

            setBtn((window.T2 ? window.T2('Capturing ', 'Aufnahme ') : 'Capturing ') + urls.length + '/' + xs.length);
          });
        })(i);
      }

      seq.then(function () {
        return Promise.all(urls.map(function (u) {
          return new Promise(function (res, rej) {
            var im = new Image(); im.onload = function () { res(im); }; im.onerror = rej; im.src = u;
          });
        }));
      }).then(function (imgs) {
        var wsrc = document.getElementById('dd-gif-worker').textContent;
        var wurl = URL.createObjectURL(new Blob([wsrc], { type: 'application/javascript' }));
        var gif = new GIF({ workers: 2, quality: 8, workerScript: wurl, width: W, height: H, background: '#ffffff' });
        imgs.forEach(function (im, idx) { gif.addFrame(im, { delay: idx === imgs.length - 1 ? 1600 : 700 }); });
        gif.on('progress', function (p) {
          setBtn((window.T2 ? window.T2('Encoding ', 'Kodieren ') : 'Encoding ') + Math.round(p * 100) + '%');
        });
        gif.on('finished', function (blob) {
          var a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'DAS-DAD-animation.gif';
          document.body.appendChild(a); a.click(); a.remove();
          removeAnimTraces(gd);
          try { updatePlots(); } catch (e) {}
          done();
        });
        gif.render();
      }).catch(function (e) {
        removeAnimTraces(gd);
        try { updatePlots(); } catch (e2) {}
        done();
      });
    });
  }

  function ddPlayAdjustment() {
    if (!window.Plotly) return;
    // Make sure we have a fresh simulation + the diagram is visible
    if (typeof updatePlots === 'function') { try { updatePlots(); } catch (e) {} }
    ensureGraphView();

    var sim = window.__ddSim;
    var gd = $('plot1');
    if (!sim || !gd) return;

    removeAnimTraces(gd);

    var N = Math.min(sim.T || 11, 11);   // trace the adjustment path through t+10
    var xs = [sim.ybar], ys = [sim.pistar];
    for (var k = 1; k <= N; k++) {
      xs.push(sim.yPath[k]);
      ys.push(sim.piPath[k]);
    }

    Plotly.addTraces(gd, [
      { x: [xs[0]], y: [ys[0]], type: 'scatter', mode: 'lines+markers',
        line: { color: '#4338ca', width: 3 },
        marker: { size: 6, color: '#4338ca' },
        name: 'Anpassungspfad', hoverinfo: 'skip', showlegend: false, _ddanim: true },
      { x: [xs[0]], y: [ys[0]], type: 'scatter', mode: 'markers+text',
        marker: { size: 14, color: '#7c5cff', line: { color: '#fff', width: 2 } },
        text: ['t−1'], textposition: 'top center',
        textfont: { color: '#3730a3', size: 13 },
        name: '', hoverinfo: 'skip', showlegend: false, _ddanim: true }
    ]).then(function () {
      var pathIdx  = gd.data.length - 2;
      var pointIdx = gd.data.length - 1;
      var i = 1;

      var b = $('dd-play-btn'), lab = $('dd-play-label'), ic = $('dd-play-icon');
      if (b) b.disabled = true;
      if (lab) lab.textContent = 'Läuft …';
      if (ic) ic.textContent = '⏳';

      if (animTimer) clearInterval(animTimer);
      animTimer = setInterval(function () {
        if (i >= xs.length) {
          clearInterval(animTimer); animTimer = null;
          if (b) b.disabled = false;
          if (lab) lab.textContent = (window.T2?window.T2('Play again','Erneut abspielen'):'Play again');
          if (ic) ic.textContent = '↻';
          return;
        }
        var px = xs.slice(0, i + 1), py = ys.slice(0, i + 1);
        var lbl = (i === 1) ? 't' : ('t+' + (i - 1));
        try {
          Plotly.restyle(gd, { x: [px], y: [py] }, [pathIdx]);
          Plotly.restyle(gd, { x: [[xs[i]]], y: [[ys[i]]], text: [[lbl]] }, [pointIdx]);
        } catch (e) { clearInterval(animTimer); animTimer = null; setPlayIdle(); }
        i++;
      }, 700);
    });
  }
